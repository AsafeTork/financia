name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      client_name:
        description: 'Nome da empresa'
        required: false
        default: 'Nancia'
      logo_url:
        description: 'URL publica do logo'
        required: false
        default: ''
      primary_color:
        description: 'Cor HEX ex: 002f59'
        required: false
        default: '002f59'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Instalar componentes Android
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-33" "build-tools;33.0.2" 2>&1 | tail -3

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p android/gradle/wrapper
          curl -fsSL "https://github.com/gradle/gradle/raw/v7.5.0/gradle/wrapper/gradle-wrapper.jar" \
            -o android/gradle/wrapper/gradle-wrapper.jar
          chmod +x android/gradlew

      - name: Instalar Pillow
        run: pip install Pillow --break-system-packages --quiet

      - name: Aplicar branding do cliente
        env:
          CLIENT_NAME: ${{ github.event.inputs.client_name || 'Nancia' }}
          LOGO_URL: ${{ github.event.inputs.logo_url || '' }}
          HEX_COLOR: ${{ github.event.inputs.primary_color || '002f59' }}
        run: |
          echo "=== Branding: $CLIENT_NAME / #$HEX_COLOR ==="

          sed -i "s|<string name=\"app_name\">.*</string>|<string name=\"app_name\">$CLIENT_NAME</string>|" \
            android/app/src/main/res/values/strings.xml

          [ -n "$LOGO_URL" ] && curl -fsSL "$LOGO_URL" -o /tmp/logo --max-time 20 || true

          python3 - << 'PY'
import os, struct, zlib
hex_c = os.environ.get('HEX_COLOR','002f59').lstrip('#')
r,g,b = int(hex_c[0:2],16),int(hex_c[2:4],16),int(hex_c[4:6],16)
sizes = {'mdpi':48,'hdpi':72,'xhdpi':96,'xxhdpi':144,'xxxhdpi':192}
has_logo = os.path.exists('/tmp/logo') and os.path.getsize('/tmp/logo')>100
try:
    from PIL import Image
    for d,s in sizes.items():
        bg = Image.new('RGBA',(s,s),(r,g,b,255))
        if has_logo:
            try:
                logo = Image.open('/tmp/logo').convert('RGBA')
                pad = int(s*0.14)
                inner = s - pad*2
                logo = logo.resize((inner,inner),Image.LANCZOS)
                bg.paste(logo,(pad,pad),logo)
            except: pass
        out = f'android/app/src/main/res/mipmap-{d}/ic_launcher.png'
        os.makedirs(os.path.dirname(out),exist_ok=True)
        bg.save(out)
        print(f'{d} {s}x{s} OK')
except Exception as e:
    print(f'Pillow error: {e} - usando PNG basico')
    def chunk(t,d):
        c=struct.pack('>I',len(d))+t+d
        return c+struct.pack('>I',zlib.crc32(t+d)&0xffffffff)
    def mkpng(sz):
        raw=b''.join(b'\x00'+bytes([r,g,b]*sz) for _ in range(sz))
        return (b'\x89PNG\r\n\x1a\n'
                +chunk(b'IHDR',struct.pack('>IIBBBBB',sz,sz,8,2,0,0,0))
                +chunk(b'IDAT',zlib.compress(raw))
                +chunk(b'IEND',b''))
    for d,sz in sizes.items():
        out=f'android/app/src/main/res/mipmap-{d}/ic_launcher.png'
        os.makedirs(os.path.dirname(out),exist_ok=True)
        with open(out,'wb') as f: f.write(mkpng(sz))
        print(f'{d} {sz}x{sz} fallback')
PY
          echo "Icones gerados."
          find android -name "*.png" | head -6 | xargs ls -lh

      - name: Gerar keystore
        run: |
          keytool -genkeypair -keystore android/app/keystore.jks -alias key0 \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass gestao2024 -keypass gestao2024 \
            -dname "CN=Gestao,O=Gestao,C=BR" -noprompt

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon 2>&1 | tail -20
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Preparar e Upload APK
        env:
          CLIENT_NAME: ${{ github.event.inputs.client_name || 'nancia' }}
        run: |
          mkdir -p apk-output
          SAFE=$(echo "$CLIENT_NAME" | tr ' ' '-' | tr -cd 'a-zA-Z0-9-' | tr '[:upper:]' '[:lower:]')
          find android -name "*.apk" -exec cp {} "apk-output/${SAFE:-nancia}.apk" \;
          ls -lh apk-output/

      - uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.event.inputs.client_name || 'nancia' }}
          path: apk-output/
          retention-days: 90
          if-no-files-found: warn
