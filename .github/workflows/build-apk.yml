name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Instalar SDK components
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-33" "build-tools;33.0.2" 2>&1 | tail -5

      - name: Baixar e instalar Gradle 7.5
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.5-bin.zip
          unzip -q gradle-7.5-bin.zip
          echo "$PWD/gradle-7.5/bin" >> $GITHUB_PATH
          $PWD/gradle-7.5/bin/gradle --version

      - name: Gerar keystore
        run: |
          keytool -genkeypair -keystore $PWD/android/app/keystore.jks -alias key0 \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass gestao2024 -keypass gestao2024 \
            -dname "CN=Gestao,O=Gestao,C=BR" -noprompt
          echo "Keystore: $(ls -lh android/app/keystore.jks)"

      - name: Build APK
        working-directory: android
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          gradle assembleDebug --no-daemon 2>&1
        env:
          STORE_PASS: gestao2024
          KEY_PASS: gestao2024

      - name: Encontrar APK
        run: |
          echo "Procurando APK..."
          find . -name "*.apk" 2>/dev/null
          find android -type d -name "outputs" 2>/dev/null
          
          mkdir -p apk-output
          find . -name "*.apk" -exec cp {} apk-output/gestao-financeira.apk \; 2>/dev/null
          ls -lh apk-output/ 2>/dev/null || echo "Pasta apk-output vazia"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gestao-financeira-apk
          path: apk-output/
          retention-days: 90
          if-no-files-found: warn
