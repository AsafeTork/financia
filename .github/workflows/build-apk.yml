name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Diagnostico completo
        run: |
          mkdir -p debug-output
          {
            echo "=== JAVA ==="
            java -version 2>&1
            
            echo "=== ANDROID_HOME ==="
            echo $ANDROID_HOME
            ls /usr/local/lib/android/sdk/ 2>/dev/null | head -10
            
            echo "=== GRADLE SISTEMA ==="
            which gradle 2>/dev/null || echo "gradle nao no PATH"
            gradle --version 2>/dev/null | head -3 || echo "gradle nao disponivel"
            
            echo "=== SDK MANAGER ==="
            ls $ANDROID_HOME/cmdline-tools/ 2>/dev/null
            
            echo "=== PLATAFORMAS INSTALADAS ==="
            ls $ANDROID_HOME/platforms/ 2>/dev/null
            
            echo "=== PROJETO ANDROID ==="
            ls -la android/
            ls -la android/app/ 2>/dev/null
            cat android/settings.gradle 2>/dev/null
            cat android/build.gradle 2>/dev/null
            cat android/app/build.gradle 2>/dev/null
          } | tee debug-output/diagnostico.txt

      - name: Upload diagnostico
        uses: actions/upload-artifact@v4
        with:
          name: diagnostico
          path: debug-output/
          retention-days: 1
          if-no-files-found: warn
