name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Instalar componentes Android
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-33" "build-tools;33.0.2" 2>&1 | tail -3

      - name: Setup Gradle 7.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '7.5'

      - name: Gerar keystore
        run: |
          keytool -genkeypair -keystore android/app/keystore.jks -alias key0 \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass gestao2024 -keypass gestao2024 \
            -dname "CN=Gestao,O=Gestao,C=BR" -noprompt

      - name: Build APK
        working-directory: android
        run: gradle assembleDebug --no-daemon 2>&1 | tail -30
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Localizar APK
        run: |
          echo "=== Todos os APKs ==="
          find . -name "*.apk" -type f 2>/dev/null | tee /tmp/apks.txt
          echo "=== Conteudo do build dir ==="
          find android/app/build -name "*.apk" -o -name "*.aab" 2>/dev/null | head -20
          
          # Copiar para pasta de saida
          mkdir -p apk-output
          while read apk; do
            cp "$apk" apk-output/gestao-financeira.apk
            echo "Copiado: $apk"
          done < /tmp/apks.txt
          
          ls -lh apk-output/ || echo "Pasta vazia"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gestao-financeira-apk
          path: apk-output/
          retention-days: 90
          if-no-files-found: warn
