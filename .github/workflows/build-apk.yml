name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Gerar keystore de assinatura
        run: |
          keytool -genkeypair -v \
            -keystore $GITHUB_WORKSPACE/android.keystore \
            -alias android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass gestao2024 -keypass gestao2024 \
            -dname "CN=Gestao Financeira,OU=App,O=Gestao,L=Braganca,S=Para,C=BR" \
            -noprompt

      - name: Criar config do Bubblewrap
        run: |
          cat > twa-manifest.json << 'TWAJSON'
          {
            "packageId": "com.gestaofinanceira.app",
            "host": "gestao-financeira-7heu.onrender.com",
            "name": "Gestao Financeira",
            "shortName": "Gestao",
            "themeColor": "#16a34a",
            "navigationColor": "#0f172a",
            "backgroundColor": "#0f172a",
            "startUrl": "/",
            "iconUrl": "https://gestao-financeira-7heu.onrender.com/icon-512.svg",
            "maskableIconUrl": "https://gestao-financeira-7heu.onrender.com/icon-512.svg",
            "appVersionName": "1.0.0",
            "appVersionCode": 1,
            "signingKey": {
              "path": "../android.keystore",
              "alias": "android"
            },
            "useBrowserOnChromeOS": false,
            "splashScreenFadeOutDuration": 300,
            "enableNotifications": false,
            "shortcuts": [],
            "features": {},
            "alphaDependencies": false,
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "minSdkVersion": 19,
            "targetSdkVersion": 34
          }
          TWAJSON

      - name: Inicializar projeto TWA
        run: |
          bubblewrap init \
            --manifest https://gestao-financeira-7heu.onrender.com/manifest.json \
            --directory twa-app
        env:
          BUBBLEWRAP_ACCEPT_OPTIONAL_DEPS: 'true'

      - name: Build APK
        working-directory: twa-app
        run: |
          bubblewrap build \
            --skipPwaValidation
        env:
          STORE_PASSWORD: gestao2024
          KEY_PASSWORD: gestao2024

      - name: Upload APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: gestao-financeira-apk
          path: |
            twa-app/app-release-signed.apk
            twa-app/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: warn
