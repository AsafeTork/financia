name: Build Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      client_name:
        description: 'Nome da empresa'
        required: false
        default: 'Financia'
      logo_url:
        description: 'URL publica do logo'
        required: false
        default: ''
      primary_color:
        description: 'Cor HEX sem # (ex: 002f59)'
        required: false
        default: '002f59'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    outputs:
      apk_name: ${{ steps.rename.outputs.apk_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Instalar dependencias de icones
        run: |
          sudo apt-get install -y librsvg2-bin 2>/dev/null || true
          pip install Pillow --break-system-packages --quiet

      - name: Instalar componentes Android
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-33" "build-tools;33.0.2" 2>&1 | tail -3

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p android/gradle/wrapper
          curl -fsSL "https://github.com/gradle/gradle/raw/v7.5.0/gradle/wrapper/gradle-wrapper.jar" \
            -o android/gradle/wrapper/gradle-wrapper.jar
          chmod +x android/gradlew

      - name: Aplicar nome do app
        env:
          CLIENT_NAME: ${{ github.event.inputs.client_name || 'Financia' }}
        run: |
          sed -i "s|<string name=\"app_name\">.*</string>|<string name=\"app_name\">$CLIENT_NAME</string>|" \
            android/app/src/main/res/values/strings.xml
          echo "App name: $CLIENT_NAME"

      - name: Baixar logo do cliente
        env:
          LOGO_URL: ${{ github.event.inputs.logo_url || '' }}
        run: |
          if [ -n "$LOGO_URL" ]; then
            curl -fsSL "$LOGO_URL" -o /tmp/logo --max-time 20 && echo "Logo OK" || echo "Sem logo URL"
          fi

      - name: Gerar icones PNG
        env:
          HEX_COLOR: ${{ github.event.inputs.primary_color || '002f59' }}
        run: python3 scripts/gen_icons.py

      - name: Verificar icones gerados
        run: find android -name "ic_launcher.png" | xargs ls -lh 2>/dev/null

      - name: Restaurar keystore permanente
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > android/app/financia.jks

      - name: Build APK Release
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon 2>&1 | tail -20
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          STORE_FILE: financia.jks
          STORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEYSTORE_PASS }}

      - name: Renomear APK
        id: rename
        env:
          CLIENT_NAME: ${{ github.event.inputs.client_name || 'financia' }}
        run: |
          mkdir -p apk-output
          SAFE=$(echo "$CLIENT_NAME" | tr ' ' '-' | tr -cd 'a-zA-Z0-9-' | tr '[:upper:]' '[:lower:]')
          SAFE=${SAFE:-financia}
          find android -name "*release*.apk" -exec cp {} "apk-output/${SAFE}.apk" \;
          find android -name "*.apk" | head -1 | xargs -I{} cp {} "apk-output/${SAFE}.apk" 2>/dev/null || true
          ls -lh apk-output/
          echo "apk_name=${SAFE}.apk" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.event.inputs.client_name || 'financia' }}
          path: apk-output/
          retention-days: 90
          if-no-files-found: warn

      - name: Salvar APK para release
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: apk-output/
          retention-days: 1

  build-windows:
    runs-on: windows-latest
    outputs:
      exe_name: ${{ steps.build.outputs.exe_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Instalar Python Pillow
        run: pip install Pillow

      - name: Baixar logo do cliente
        env:
          LOGO_URL: ${{ github.event.inputs.logo_url || '' }}
        shell: bash
        run: |
          if [ -n "$LOGO_URL" ]; then
            curl -fsSL "$LOGO_URL" -o /tmp/logo --max-time 20 && echo "Logo OK" || echo "Sem logo"
          fi

      - name: Gerar icone Windows
        env:
          HEX_COLOR: ${{ github.event.inputs.primary_color || '002f59' }}
        run: python scripts/gen_icon_win.py

      - name: Aplicar nome do app
        env:
          CLIENT_NAME: ${{ github.event.inputs.client_name || 'Financia' }}
        shell: bash
        run: |
          sed -i "s|\"productName\": \".*\"|\"productName\": \"$CLIENT_NAME\"|" package.json

      - name: Build Windows exe
        id: build
        env:
          CLIENT_NAME: ${{ github.event.inputs.client_name || 'financia' }}
        shell: bash
        run: |
          npx electron-builder --win --publish never
          SAFE=$(echo "$CLIENT_NAME" | tr ' ' '-' | tr -cd 'a-zA-Z0-9-' | tr '[:upper:]' '[:lower:]')
          SAFE=${SAFE:-financia}
          find dist -name "*.exe" | head -1 | xargs -I{} cp {} "${SAFE}-setup.exe" 2>/dev/null || true
          ls -lh *.exe 2>/dev/null
          echo "exe_name=${SAFE}-setup.exe" >> "$GITHUB_OUTPUT"

      - name: Salvar exe para release
        uses: actions/upload-artifact@v4
        with:
          name: release-exe
          path: "*.exe"
          retention-days: 1

  create-release:
    needs: [build-apk, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Baixar APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: release-files/

      - name: Baixar EXE
        uses: actions/download-artifact@v4
        with:
          name: release-exe
          path: release-files/

      - name: Listar arquivos
        run: ls -lh release-files/

      - name: Criar GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLIENT_NAME: ${{ github.event.inputs.client_name || 'Financia' }}
          PRIMARY_COLOR: ${{ github.event.inputs.primary_color || '002f59' }}
        run: |
          TAG="v$(date +'%Y%m%d%H%M%S')"
          SAFE=$(echo "$CLIENT_NAME" | tr ' ' '-' | tr -cd 'a-zA-Z0-9-')
          gh release create "$TAG" release-files/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "Release $SAFE - $(date +'%Y-%m-%d %H:%M')" \
            --notes "Build automatico para cliente: $CLIENT_NAME (cor: #$PRIMARY_COLOR)" \
            --latest
