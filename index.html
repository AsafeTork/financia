<!DOCTYPE html>
<html lang="pt-BR">

<meta charset="UTF-8">

<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useMemo,useCallback,useRef,memo} = React;
const {createClient} = window.supabase;

// ─── Configuração central ────────────────────────────────────────────────────
// Chave pública (publishable) — segura para expor no frontend
// A proteção real vem do RLS no Supabase, não desta chave
const sb = createClient(
  'https://kxeqhorxhlgwcgywovqr.supabase.co',
  'sb_publishable_EVJrndaIaxwLN9vUdSByUg__itH2rLy'
);

// ─── Limite máximo de registros por query ────────────────────────────────────
// Evita carregar 10.000 linhas de uma vez e travar o browser
const QUERY_LIMIT = 500;

// ─── Limite máximo de caracteres por campo de texto ─────────────────────────
const MAX_TEXT = 200;

const INIT_BRAND = {name:'Gestão Pro', color:'#16a34a', logo:'💼', logo_url:null};

// ─── Formatadores ────────────────────────────────────────────────────────────
const fmt    = v  => Number(v).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const today  = () => new Date().toISOString().slice(0,10);
const prevDays = n => { const d=new Date(); d.setDate(d.getDate()-n); return d.toISOString().slice(0,10); };
const fmtDate  = s => new Date(s+'T12:00').toLocaleDateString('pt-BR');
const monthLabel = s => { const [y,m]=s.split('-'); return new Date(+y,+m-1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'}); };

// ─── Sanitização de texto ────────────────────────────────────────────────────
// Remove caracteres perigosos para XSS e limita tamanho
// ANTES: só removia < >  DEPOIS: remove tudo que pode executar código
const sanitizeText = (value) => {
  if(value == null) return '';
  return String(value)
    .replace(/[<>"]/g, "")           // remove tags e aspas usadas em ataques
    .replace(/javascript:/gi, '')     // bloqueia links javascript:
    .replace(/on\w+=/gi, '')          // bloqueia onclick= onerror= etc
    .trim()
    .slice(0, MAX_TEXT);              // limita tamanho máximo
};

let _idCounter = 1;
const generateId = () => String(Date.now()) + String(++_idCounter);

// ─── Gerador de senha segura ─────────────────────────────────────────────────
const generatePassword = () => {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789!@#';
  return Array.from({length:12}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
};

// ─── Componentes base ────────────────────────────────────────────────────────
// memo() evita re-renderização quando as props não mudaram
const Inp = memo(({label,hint,className='',...props}) => (
  <div className={'flex flex-col gap-1.5 '+className}>
    {label && <label className="text-xs font-semibold text-gray-400 uppercase tracking-wide">{label}</label>}
    <input className="border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-white focus:outline-none focus:border-gray-500 transition w-full" {...props}/>
    {hint && <p className="text-xs text-red-400">{hint}</p>}
  </div>
));

const Sel = memo(({label,className='',children,...props}) => (
  <div className={'flex flex-col gap-1.5 '+className}>
    {label && <label className="text-xs font-semibold text-gray-400 uppercase tracking-wide">{label}</label>}
    <select className="border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-white focus:outline-none focus:border-gray-500 transition" {...props}>{children}</select>
  </div>
));

const Textarea = memo(({label,className='',...props}) => (
  <div className={'flex flex-col gap-1.5 '+className}>
    {label && <label className="text-xs font-semibold text-gray-400 uppercase tracking-wide">{label}</label>}
    <textarea className="border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-white focus:outline-none focus:border-gray-500 transition w-full resize-none" rows={6} {...props}/>
  </div>
));

const Card  = memo(({children,className=''}) => <div className={'bg-white rounded-2xl shadow-sm border border-gray-100 '+className}>{children}</div>);
const Spin  = ({white}) => <div className={'w-5 h-5 border-2 rounded-full animate-spin flex-shrink-0 '+(white?'border-white border-t-transparent':'border-gray-300 border-t-gray-700')}/>;
const Empty = memo(({icon,title,sub,action,onAction}) => (
  <div className="py-14 flex flex-col items-center gap-3 text-center px-6">
    <div className="text-4xl">{icon}</div>
    <p className="text-sm font-semibold text-gray-700">{title}</p>
    <p className="text-xs text-gray-400 max-w-xs">{sub}</p>
    {action && <button onClick={onAction} className="mt-2 text-xs font-semibold px-4 py-2 rounded-xl text-white bg-green-600">{action}</button>}
  </div>
));

// ─── Toast (notificação temporária) ─────────────────────────────────────────
const Toast = memo(({toast}) => toast ? (
  <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 anim-up pointer-events-none">
    <div className={'flex items-center gap-2.5 px-5 py-3 rounded-2xl shadow-xl text-sm font-medium text-white '+(toast.type==='error'?'bg-red-600':'bg-gray-900')}>
      <span>{toast.type==='error'?'X':'OK'}</span>{toast.msg}
    </div>
  </div>
) : null);

// ─── Banner de internet ──────────────────────────────────────────────────────
const OfflineBanner = () => {
  const [isOffline, setIsOffline] = useState(!navigator.onLine);
  useEffect(() => {
    const goOnline  = () => setIsOffline(false);
    const goOffline = () => setIsOffline(true);
    window.addEventListener('online',  goOnline);
    window.addEventListener('offline', goOffline);
    return () => { window.removeEventListener('online',goOnline); window.removeEventListener('offline',goOffline); };
  }, []);
  return isOffline
    ? <div className="fixed top-0 left-0 right-0 z-50 bg-amber-500 text-white text-xs font-semibold text-center py-2">Sem internet — alteracoes nao serao salvas</div>
    : null;
};

// ─── Caixa de confirmação antes de deletar ───────────────────────────────────
// Evita exclusões acidentais
const ConfirmDialog = memo(({message, onConfirm, onCancel}) => (
  <div className="fixed inset-0 z-50 flex items-center justify-center p-4 anim-fade" style={{background:'rgba(0,0,0,0.5)'}}>
    <div className="bg-white rounded-2xl w-full max-w-xs p-6 flex flex-col gap-4" style={{boxShadow:'0 25px 60px rgba(0,0,0,0.2)'}}>
      <p className="text-sm text-gray-700 text-center leading-relaxed">{message}</p>
      <div className="flex gap-2">
        <button onClick={onCancel}  className="flex-1 border border-gray-200 text-gray-600 rounded-xl py-2.5 text-sm font-medium hover:bg-gray-50">Cancelar</button>
        <button onClick={onConfirm} className="flex-1 bg-red-600 text-white rounded-xl py-2.5 text-sm font-semibold hover:opacity-90">Confirmar</button>
      </div>
    </div>
  </div>
));

// ─── Modal genérico ──────────────────────────────────────────────────────────

      <div className="flex items-center justify-between px-6 py-4 border-b border-gray-100 flex-shrink-0">
        <span className="font-semibold text-gray-900">{title}</span>
        <button onClick={onClose} className="text-gray-400 hover:text-gray-600 p-1 rounded-lg hover:bg-gray-100">
          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div className="px-6 py-4 flex flex-col gap-3 overflow-y-auto flex-1">{children}</div>
      <div className="flex gap-2 px-6 pb-5 flex-shrink-0 pt-2">
        <button onClick={onClose} className="flex-1 border border-gray-200 text-gray-600 rounded-xl py-2.5 text-sm font-medium hover:bg-gray-50">Cancelar</button>
        <button onClick={onSave} disabled={saving} className="flex-1 text-white rounded-xl py-2.5 text-sm font-semibold hover:opacity-90 flex items-center justify-center gap-2" style={{background:color}}>
          {saving ? <Spin white/> : saveLabel}
        </button>
      </div>
    </div>
  </div>
));

const EditBtn = memo(({onClick}) => (
  <button onClick={onClick} className="p-1.5 rounded-lg text-gray-300 hover:text-blue-500 hover:bg-blue-50 transition flex-shrink-0">
    <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
  </button>
));

const DelBtn = memo(({onClick}) => (
  <button onClick={onClick} className="p-1.5 rounded-lg text-gray-300 hover:text-red-500 hover:bg-red-50 transition flex-shrink-0">
    <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
  </button>
));

// ─── Busca de produto com autocomplete ──────────────────────────────────────
const ProductSearch = memo(({products, value, onSelect, onChange, placeholder}) => {
  const [isOpen, setIsOpen] = useState(false);
  const filtered = value.length > 0
    ? products.filter(p => p.name.toLowerCase().includes(value.toLowerCase()))
    : products;
  return (
    <div className="relative flex-1">
      <input value={value}
        onChange={e => { onChange(e.target.value); setIsOpen(true); }}
        onFocus={() => setIsOpen(true)}
        onBlur={() => setTimeout(() => setIsOpen(false), 120)}
        placeholder={placeholder || (products.length > 0 ? 'Buscar produto...' : 'Descricao')}
        className="border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-white focus:outline-none focus:border-gray-500 transition w-full"/>
      {isOpen && filtered.length > 0 && (
        <div className="absolute top-full left-0 right-0 mt-1 bg-white rounded-xl border border-gray-200 z-30 overflow-hidden max-h-48 overflow-y-auto" style={{boxShadow:'0 8px 24px rgba(0,0,0,0.1)'}}>
          {filtered.map(product => (
            <button key={product.id} onMouseDown={() => { onSelect(product); setIsOpen(false); }}
              className="flex items-center justify-between w-full px-3 py-2.5 hover:bg-gray-50 text-left border-b border-gray-50 last:border-0">
              <div className="flex items-center gap-2 min-w-0">
                {product.category && <span className="text-xs bg-gray-100 text-gray-400 px-1.5 py-0.5 rounded-md flex-shrink-0">{product.category}</span>}
                <span className="text-sm text-gray-800 truncate">{product.name}</span>
                {product.stock != null && (
                  <span className={'text-xs px-1.5 py-0.5 rounded-full flex-shrink-0 '+(product.stock<=0?'bg-red-50 text-red-500':product.stock<=5?'bg-amber-50 text-amber-600':'bg-gray-100 text-gray-500')}>
                    {product.stock}un
                  </span>
                )}
              </div>
              <span className="text-xs font-semibold text-gray-400 ml-2">{fmt(product.price)}</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
});

// ─── Item do carrinho de venda ───────────────────────────────────────────────
const CartItem = memo(({item, index, products, onChange, onSelectProduct, onRemove}) => {
  const lineTotal = (Number(item.qty)||0) * (Number(item.unitPrice)||0);
  return (
    <div className="rounded-xl border border-gray-100 bg-gray-50 p-3 flex flex-col gap-2">
      <div className="flex items-center gap-2">
        <ProductSearch products={products} value={item.desc}
          onSelect={p => onSelectProduct(index, p.name, p.price)}
          onChange={v => onChange(index, 'desc', v)}/>
        {onRemove && (
          <button onClick={onRemove} className="text-gray-300 hover:text-red-400 p-1 flex-shrink-0">
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        )}
      </div>
      <div className="flex items-end gap-2">
        <Inp label="Qtd" type="number" min="1" value={item.qty} onChange={e => onChange(index,'qty',e.target.value)} className="w-16 flex-shrink-0"/>
        <Inp label="Preco unit." type="number" step="0.01" min="0" value={item.unitPrice} onChange={e => onChange(index,'unitPrice',e.target.value)} className="flex-1"/>
        <div className="flex flex-col gap-1.5 w-24 flex-shrink-0">
          <label className="text-xs font-semibold text-gray-400 uppercase tracking-wide">Total</label>
          <div className="border border-gray-100 rounded-xl px-3 py-2.5 text-sm bg-white text-gray-700 font-semibold">{lineTotal>0 ? fmt(lineTotal) : '-'}</div>
        </div>
      </div>
    </div>
  );
});

// ─── Formulário de nova venda ────────────────────────────────────────────────
const SaleForm = memo(({products, brand, onSave, onClose}) => {
  const [items,   setItems]  = useState([{desc:'', qty:'1', unitPrice:''}]);
  const [date,    setDate]   = useState(today());
  const [method,  setMethod] = useState('PIX');
  const [saving,  setSaving] = useState(false);
  const saleTotal = items.reduce((sum, item) => sum + (Number(item.qty)||0)*(Number(item.unitPrice)||0), 0);

  const updateItem     = useCallback((idx,field,val) => setItems(prev => prev.map((it,i) => i===idx ? {...it,[field]:val} : it)), []);
  const selectProduct  = useCallback((idx,name,price) => setItems(prev => prev.map((it,i) => i===idx ? {...it,desc:name,unitPrice:String(price)} : it)), []);
  const addItem        = useCallback(() => setItems(prev => [...prev, {desc:'',qty:'1',unitPrice:''}]), []);
  const removeItem     = useCallback(idx => setItems(prev => prev.filter((_,i) => i!==idx)), []);

  const handleSave = async () => {
    const validItems = items.filter(item => item.desc && item.unitPrice);
    if(!validItems.length || !saleTotal) return;
    setSaving(true);
    const desc = validItems.length===1 ? sanitizeText(validItems[0].desc) : validItems.length+' itens';
    await onSave({
      id: generateId(), type:'income', desc,
      items: validItems.map(item => ({desc:sanitizeText(item.desc), qty:Number(item.qty)||1, unitPrice:Number(item.unitPrice)})),
      amount: saleTotal, date, method
    });
    onClose();
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 anim-fade" style={{background:'rgba(0,0,0,0.5)'}}>
      <div className="bg-white rounded-t-2xl sm:rounded-2xl w-full sm:max-w-lg flex flex-col" style={{maxHeight:'90vh',boxShadow:'0 25px 60px rgba(0,0,0,0.2)'}}>
        <div className="flex items-center justify-between px-6 py-4 border-b border-gray-100 flex-shrink-0">
          <span className="font-semibold text-gray-900">Nova Venda</span>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 p-1 rounded-lg hover:bg-gray-100">
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
        <div className="overflow-y-auto flex-1 px-6 py-4 flex flex-col gap-4">
          <div className="flex flex-col gap-3">
            {items.map((item, idx) => (
              <CartItem key={idx} item={item} index={idx} products={products}
                onChange={updateItem} onSelectProduct={selectProduct}
                onRemove={items.length > 1 ? () => removeItem(idx) : null}/>
            ))}
            <button onClick={addItem} className="flex items-center gap-2 text-sm text-gray-400 hover:text-gray-600 w-fit">
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>Adicionar item
            </button>
          </div>
          <div className="flex items-center justify-between py-3 border-t border-b border-gray-100">
            <span className="text-sm font-semibold text-gray-600">Total da venda</span>
            <span className="text-2xl font-bold text-gray-900">{fmt(saleTotal)}</span>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <Inp label="Data" type="date" value={date} onChange={e => setDate(e.target.value)}/>
            <Sel label="Pagamento" value={method} onChange={e => setMethod(e.target.value)}>
              {['PIX','Dinheiro','Cartao de Debito','Cartao de Credito','Boleto','Transferencia'].map(m => <option key={m}>{m}</option>)}
            </Sel>
          </div>
        </div>
        <div className="flex gap-2 px-6 pb-6 pt-3 flex-shrink-0">
          <button onClick={onClose} className="flex-1 border border-gray-200 text-gray-600 rounded-xl py-3 text-sm font-medium hover:bg-gray-50">Cancelar</button>
          <button onClick={handleSave} disabled={saving} className="flex-1 text-white rounded-xl py-3 text-sm font-semibold hover:opacity-90 flex items-center justify-center gap-2" style={{background:brand.color}}>
            {saving ? <Spin white/> : ('Confirmar - '+fmt(saleTotal))}
          </button>
        </div>
      </div>
    </div>
  );
});

// ─── Navegação lateral ───────────────────────────────────────────────────────
const NAV_ITEMS = [
  {key:'dashboard', label:'Dashboard',    d:'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6'},

  {key:'email',     label:'E-mails',      d:'M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z'},

  {key:'settings',  label:'Configuracoes',d:'M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z M15 12a3 3 0 11-6 0 3 3 0 016 0z'},
];

const Sidebar = memo(({currentView, onNavigate, brand, isOpen, onClose}) => (
  <>
    {isOpen && <div className="fixed inset-0 z-30 bg-black bg-opacity-50 lg:hidden" onClick={onClose}/>}
    <aside className={'fixed top-0 left-0 h-full w-64 z-40 flex flex-col transition-transform duration-300 '+(isOpen?'translate-x-0':'-translate-x-full')+' lg:translate-x-0'} style={{background:'#0f172a'}}>
      <div className="px-5 py-5 flex items-center gap-3" style={{borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
        {brand.logo_url
          ? <img src={brand.logo_url} alt="logo" className="w-9 h-9 rounded-xl object-cover flex-shrink-0"/>
          : <div className="w-9 h-9 rounded-xl flex items-center justify-center text-lg flex-shrink-0" style={{background:brand.color}}>{brand.logo}</div>
        }
        <span className="font-bold text-white truncate">{brand.name}</span>
      </div>
      <nav className="flex-1 px-3 py-4 flex flex-col gap-0.5 overflow-y-auto">
        {NAV_ITEMS.map(({key, label, d}) => (
          <button key={key} onClick={() => { onNavigate(key); onClose(); }}
            className="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition w-full text-left relative"
            style={currentView===key ? {background:'rgba(255,255,255,0.08)',color:'white'} : {color:'rgba(255,255,255,0.4)'}}>
            {currentView===key && <div className="absolute left-0 top-1/2 -translate-y-1/2 w-0.5 h-5 rounded-r-full" style={{background:brand.color}}/>}
            <svg className="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.75} d={d}/>
            </svg>
            {label}
          </button>
        ))}

const KpiCard = memo(({label, value, sub, color}) => (
  <Card className="p-5 overflow-hidden relative">
    <div className="absolute top-0 left-0 right-0 h-0.5 rounded-t-2xl" style={{background:color}}/>
    <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide">{label}</p>

));

const BarChartSVG = memo(({data}) => {
  const maxValue = Math.max(...data.flatMap(d => [d.income, d.expense]), 1);
  const COL_W=44, HEIGHT=130, BAR_W=10, PADDING=4;
  return (
    <svg width="100%" height={HEIGHT} viewBox={'0 0 '+(data.length*COL_W)+' '+HEIGHT} preserveAspectRatio="xMidYMid meet">
      {data.map((day, i) => {
        const x          = i*COL_W + PADDING;
        const incomeH    = Math.round((day.income  / maxValue) * (HEIGHT-24));
        const expenseH   = Math.round((day.expense / maxValue) * (HEIGHT-24));
        return (
          <g key={i}>
            <rect x={x}        y={HEIGHT-24-incomeH}  width={BAR_W} height={incomeH||1}  fill="#16a34a" rx={2}/>
            <rect x={x+BAR_W+2} y={HEIGHT-24-expenseH} width={BAR_W} height={expenseH||1} fill="#fca5a5" rx={2}/>
            <text x={x+BAR_W+1} y={HEIGHT-6} textAnchor="middle" fontSize={9} fill="#9ca3af">{day.label}</text>
          </g>
        );
      })}
    </svg>
  );
});

    const expenses = monthTx.filter(t => t.type==='expense').reduce((s,t) => s+t.amount, 0);
    return {income, expenses, profit: income - expenses};

  const todayStats = useMemo(() => {
    const todayTx  = transactions.filter(t => t.date===today());

// Reutilizável para os dois tipos via prop "type"
const TransactionView = memo(({type, transactions, products, onAdd, onEdit, onDelete, onDeductStock, brand, showToast, showConfirm}) => {
  const isIncome = type==='income';
  const EXPENSE_CATEGORIES = ['Fixo','Variavel','Estoque','Marketing','Pessoal','Servicos','Outro'];
  const PAYMENT_METHODS    = ['PIX','Dinheiro','Cartao de Debito','Cartao de Credito','Boleto','Transferencia'];

  const [showNewModal,  setShowNewModal]  = useState(false);
  const [editingItem,   setEditingItem]   = useState(null);
  const [saving,        setSaving]        = useState(false);
  const [searchText,    setSearchText]    = useState('');
  const [filterFrom,    setFilterFrom]    = useState('');
  const [filterTo,      setFilterTo]      = useState('');
  const [newForm,       setNewForm]       = useState({desc:'', amount:'', date:today(), category:'Fixo', method:'PIX'});

  // useMemo = só recalcula a lista filtrada quando filtros ou dados mudarem
  const filteredList = useMemo(() => {
    let list = transactions.filter(t => t.type===type);
    if(searchText) list = list.filter(t => t.desc.toLowerCase().includes(searchText.toLowerCase()));
    if(filterFrom) list = list.filter(t => t.date >= filterFrom);
    if(filterTo)   list = list.filter(t => t.date <= filterTo);
    return list.sort((a,b) => b.date.localeCompare(a.date));
  }, [transactions, type, searchText, filterFrom, filterTo]);

  const totalAmount = useMemo(() => filteredList.reduce((s,t) => s+t.amount, 0), [filteredList]);

  // useCallback = a funcao nao e recriada a cada render, economiza memoria
  const openEditModal  = useCallback(tx => setEditingItem({id:tx.id, desc:tx.desc, amount:String(tx.amount), date:tx.date, category:tx.category||'Fixo', method:tx.method||'PIX'}), []);
  const clearFilters   = useCallback(() => { setSearchText(''); setFilterFrom(''); setFilterTo(''); }, []);

  const handleSaveNew = async () => {
    if(!newForm.desc || !newForm.amount) return;
    setSaving(true);
    await onAdd({
      id: generateId(), type,
      desc:     sanitizeText(newForm.desc),
      amount:   Number(newForm.amount),
      date:     newForm.date,
      method:   isIncome ? newForm.method   : null,
      category: isIncome ? null : newForm.category,
    });
    showToast(isIncome ? 'Venda registrada!' : 'Despesa registrada!');
    setShowNewModal(false);
    setSaving(false);
    setNewForm({desc:'', amount:'', date:today(), category:'Fixo', method:'PIX'});
  };

  const handleSaveEdit = async () => {
    if(!editingItem.desc || !editingItem.amount) return;
    setSaving(true);
    await onEdit(editingItem.id, {
      desc:     sanitizeText(editingItem.desc),
      amount:   Number(editingItem.amount),
      date:     editingItem.date,
      method:   isIncome ? editingItem.method   : null,
      cat:      isIncome ? null : editingItem.category,
    });
    showToast(isIncome ? 'Venda atualizada' : 'Despesa atualizada');
    setSaving(false);
    setEditingItem(null);
  };

  const handleExportCSV = useCallback(() => {
    const header = 'Data,Descricao,Valor,Tipo,Metodo/Categoria';
    const rows = filteredList.map(t =>
      t.date+',"'+t.desc+'",'+t.amount.toFixed(2)+','+(t.type==='income'?'Entrada':'Saida')+','+(t.method||t.category||'')
    );
    const csv = String.fromCharCode(65279) + header + "\n" + rows.join("\n");
    const link = document.createElement('a');
    link.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    link.download = (isIncome?'vendas':'despesas')+'-'+today()+'.csv';
    link.click();
    showToast('CSV exportado!');
  }, [filteredList, isIncome, showToast]);

  return (
    <div className="flex flex-col gap-6">
      <div className="flex items-start justify-between">
        <div>
          <h2 className="text-2xl font-bold text-gray-900">{isIncome ? 'Vendas' : 'Despesas'}</h2>
          <p className="text-sm text-gray-400 mt-0.5">
            {filteredList.length+' registro'+(filteredList.length!==1?'s':'')+' - '}
            <span className={'font-semibold '+(isIncome?'text-green-600':'text-red-500')}>{fmt(totalAmount)}</span>
          </p>
        </div>
        <div className="flex gap-2">
          <button onClick={handleExportCSV} title="Exportar CSV" className="p-2.5 border border-gray-200 text-gray-500 rounded-xl hover:bg-gray-50 transition">
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          </button>
          <button onClick={() => setShowNewModal(true)} className="flex items-center gap-2 text-white text-sm font-semibold px-4 py-2.5 rounded-xl hover:opacity-90" style={{background:brand.color}}>
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
            {isIncome ? 'Nova Venda' : 'Nova Despesa'}
          </button>
        </div>
      </div>

      <Card className="p-4 flex flex-col gap-3">
        <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide">Filtros</p>
        <div className="grid grid-cols-1 gap-2 sm:grid-cols-3">
          <div className="relative">
            <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input value={searchText} onChange={e => setSearchText(e.target.value)} placeholder="Buscar descricao..."
              className="w-full pl-9 pr-3 py-2 text-sm border border-gray-200 rounded-xl focus:outline-none focus:border-gray-400 bg-white"/>
          </div>
          <Inp type="date" value={filterFrom} onChange={e => setFilterFrom(e.target.value)} placeholder="Data inicial"/>
          <Inp type="date" value={filterTo}   onChange={e => setFilterTo(e.target.value)}   placeholder="Data final"/>
        </div>
        {(searchText||filterFrom||filterTo) && (
          <button onClick={clearFilters} className="text-xs text-gray-400 hover:text-gray-600 w-fit">Limpar filtros</button>
        )}
      </Card>

      <Card>
        {filteredList.length===0
          ? <Empty icon={isIncome?'💰':'📤'} title={isIncome?'Nenhuma venda':'Nenhuma despesa'} sub={isIncome?'Registre vendas com multiplos itens.':'Registre aluguel, energia, fornecedores.'}/>
          : <div className="divide-y divide-gray-50">{filteredList.map(tx => (
              <div key={tx.id} className="flex items-center justify-between px-4 py-3.5 gap-3">
                <div className="flex items-center gap-3 min-w-0 flex-1">
                  <div className={'w-8 h-8 rounded-xl flex items-center justify-center text-sm font-bold flex-shrink-0 '+(isIncome?'bg-green-50 text-green-600':'bg-red-50 text-red-500')}>{isIncome?'+':'-'}</div>
                  <div className="min-w-0">
                    <p className="text-sm font-medium text-gray-800 truncate">{tx.desc}</p>
                    <p className="text-xs text-gray-400">{fmtDate(tx.date)+' - '+(tx.method||tx.category||'')+(tx.items&&tx.items.length>1?' - '+tx.items.length+' itens':'')}</p>
                  </div>
                </div>
                <div className="flex items-center gap-1 flex-shrink-0">
                  <span className={'text-sm font-semibold mr-1 '+(isIncome?'text-green-600':'text-red-500')}>{(isIncome?'+':'-')+fmt(tx.amount)}</span>
                  <EditBtn onClick={() => openEditModal(tx)}/>
                  <DelBtn  onClick={() => showConfirm('Excluir este registro permanentemente?', async () => { await onDelete(tx.id); showToast('Removido'); })}/>
                </div>
              </div>
            ))}</div>
        }
      </Card>

      {showNewModal && (
        isIncome
          ? <SaleForm products={products} brand={brand}
              onSave={async sale => {
                await onAdd(sale);
                if(sale.items) sale.items.forEach(item => {
                  const product = products.find(p => p.name===item.desc);
                  if(product && product.stock!=null) onDeductStock(product.id, item.qty);
                });
                showToast('Venda registrada!');
              }}
              onClose={() => setShowNewModal(false)}/>
          : <Modal title="Nova Despesa" onClose={() => setShowNewModal(false)} onSave={handleSaveNew} saving={saving}>
              <Inp label="Descricao" value={newForm.desc} onChange={e => setNewForm(f=>({...f,desc:e.target.value}))} placeholder="Ex: Aluguel, Energia..." maxLength={MAX_TEXT}/>
              <Inp label="Valor (R$)" type="number" step="0.01" min="0" value={newForm.amount} onChange={e => setNewForm(f=>({...f,amount:e.target.value}))} placeholder="0,00"/>
              <Inp label="Data" type="date" value={newForm.date} onChange={e => setNewForm(f=>({...f,date:e.target.value}))}/>
              <Sel label="Categoria" value={newForm.category} onChange={e => setNewForm(f=>({...f,category:e.target.value}))}>{EXPENSE_CATEGORIES.map(c => <option key={c}>{c}</option>)}</Sel>
            </Modal>
      )}

      {editingItem && (
        <Modal title={isIncome?'Editar Venda':'Editar Despesa'} onClose={() => setEditingItem(null)} onSave={handleSaveEdit} saving={saving} saveLabel="Salvar alteracoes">
          <Inp label="Descricao" value={editingItem.desc} onChange={e => setEditingItem(f=>({...f,desc:e.target.value}))} maxLength={MAX_TEXT}/>
          <Inp label="Valor (R$)" type="number" step="0.01" min="0" value={editingItem.amount} onChange={e => setEditingItem(f=>({...f,amount:e.target.value}))}/>
          <Inp label="Data" type="date" value={editingItem.date} onChange={e => setEditingItem(f=>({...f,date:e.target.value}))}/>
          {isIncome
            ? <Sel label="Pagamento" value={editingItem.method} onChange={e => setEditingItem(f=>({...f,method:e.target.value}))}>{PAYMENT_METHODS.map(m => <option key={m}>{m}</option>)}</Sel>
            : <Sel label="Categoria" value={editingItem.category} onChange={e => setEditingItem(f=>({...f,category:e.target.value}))}>{EXPENSE_CATEGORIES.map(c => <option key={c}>{c}</option>)}</Sel>
          }
        </Modal>
      )}
    </div>
  );
});

const InventoryView = memo(({products, losses, onAddProduct, onEditProduct, onDeleteProduct, onAddLoss, onEditLoss, onDeleteLoss, onAdjustStock, brand, showToast, showConfirm}) => {
  const [activeTab,      setActiveTab]      = useState('products');
  const [searchText,     setSearchText]     = useState('');
  const [collapsedCats,  setCollapsedCats]  = useState(new Set());
  const [showAddProduct, setShowAddProduct] = useState(false);
  const [editingProduct, setEditingProduct] = useState(null);
  const [showAddLoss,    setShowAddLoss]    = useState(false);
  const [editingLoss,    setEditingLoss]    = useState(null);
  const [reposingStock,  setReposingStock]  = useState(null);
  const [productForm,    setProductForm]    = useState({name:'', category:'', price:'', cost:'', stock:''});
  const [lossForm,       setLossForm]       = useState({desc:'', qty:'1', reason:'', date:today()});
  const [repoQty,        setRepoQty]        = useState('1');
  const [saving,         setSaving]         = useState(false);

  const handleAddProduct = async () => {
    if(!productForm.name || !productForm.price) return;
    setSaving(true);
    await onAddProduct({id:'P'+String(Date.now()).slice(-6), name:sanitizeText(productForm.name), category:productForm.category||null, price:Number(productForm.price), cost:productForm.cost?Number(productForm.cost):null, stock:productForm.stock!==''?Number(productForm.stock):null});
    showToast('Produto adicionado!'); setSaving(false); setShowAddProduct(false); setProductForm({name:'',category:'',price:'',cost:'',stock:''});
  };

  const handleEditProduct = async () => {
    if(!editingProduct.name || !editingProduct.price) return;
    setSaving(true);
    await onEditProduct(editingProduct.id, {name:sanitizeText(editingProduct.name), category:editingProduct.category||null, price:Number(editingProduct.price), cost:editingProduct.cost?Number(editingProduct.cost):null, stock:editingProduct.stock!==''&&editingProduct.stock!=null?Number(editingProduct.stock):null});
    showToast('Produto atualizado'); setSaving(false); setEditingProduct(null);
  };

  const handleAddLoss = async () => {
    if(!lossForm.desc || !lossForm.qty) return;
    setSaving(true);
    await onAddLoss({id:generateId(), desc:sanitizeText(lossForm.desc), qty:Number(lossForm.qty), reason:sanitizeText(lossForm.reason), date:lossForm.date});
    const matchingProduct = products.find(p => p.name===lossForm.desc);
    if(matchingProduct && matchingProduct.stock!=null) await onAdjustStock(matchingProduct.id, -Number(lossForm.qty));
    showToast('Perda registrada'); setSaving(false); setShowAddLoss(false); setLossForm({desc:'',qty:'1',reason:'',date:today()});
  };

  const handleEditLoss = async () => {
    if(!editingLoss.desc || !editingLoss.qty) return;
    setSaving(true);
    await onEditLoss(editingLoss.id, {desc:sanitizeText(editingLoss.desc), qty:Number(editingLoss.qty), reason:sanitizeText(editingLoss.reason), date:editingLoss.date});
    showToast('Perda atualizada'); setSaving(false); setEditingLoss(null);
  };

  const handleRepoStock = async () => {
    if(!repoQty || !reposingStock) return;
    setSaving(true);
    await onAdjustStock(reposingStock, Number(repoQty));
    showToast('Estoque atualizado!'); setSaving(false); setReposingStock(null); setRepoQty('1');
  };

  const toggleCategory = useCallback(cat => setCollapsedCats(prev => {
    const next = new Set(prev); next.has(cat) ? next.delete(cat) : next.add(cat); return next;
  }), []);

  const filteredProducts = useMemo(() =>
    searchText.trim()
      ? products.filter(p => [p.name, p.category, p.id].filter(Boolean).some(v => v.toLowerCase().includes(searchText.toLowerCase())))
      : products,
    [products, searchText]
  );

  const groupedProducts = useMemo(() =>
    Object.entries(filteredProducts.reduce((groups, product) => {
      const cat = product.category || 'Sem categoria';
      (groups[cat] = groups[cat]||[]).push(product);
      return groups;
    }, {})).sort(([a],[b]) => a==='Sem categoria'?1:b==='Sem categoria'?-1:a.localeCompare(b)),
    [filteredProducts]
  );

  const reposingProduct = reposingStock ? products.find(p => p.id===reposingStock) : null;

  return (
    <div className="flex flex-col gap-6">
      <div className="flex items-start justify-between">

const EmailView = memo(({brand, showToast}) => {
  const [toEmail,  setToEmail]  = useState('');
  const [subject,  setSubject]  = useState('');
  const [body,     setBody]     = useState('');
  const [template, setTemplate] = useState('custom');
  const [copied,   setCopied]   = useState(false);

  const applyTemplate = useCallback(id => {
    setTemplate(id);
    const tpl = EMAIL_TEMPLATES.find(t => t.id===id);
    if(tpl) { setSubject(tpl.subject); setBody(tpl.body); }
  }, []);

  const handleSend = useCallback(() => {
    if(!toEmail || !subject || !body) return;
    window.open('mailto:'+encodeURIComponent(toEmail)+'?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent(body), '_blank');
    showToast('Abrindo seu e-mail...');
  }, [toEmail, subject, body, showToast]);

  const handleCopy = useCallback(async () => {
    await navigator.clipboard.writeText("Para: "+toEmail+"
Assunto: "+subject+"

"+body);
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
    showToast('Copiado!');
  }, [toEmail, subject, body, showToast]);

  return (
    <div className="flex flex-col gap-6">
      <div><h2 className="text-2xl font-bold text-gray-900">E-mails</h2><p className="text-sm text-gray-400 mt-0.5">Templates prontos e editor livre</p></div>
      <Card className="p-5 flex flex-col gap-4">
        <div>
          <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Template</p>
          <div className="flex gap-2 flex-wrap">
            {EMAIL_TEMPLATES.map(t => (
              <button key={t.id} onClick={() => applyTemplate(t.id)}
                className={'text-xs font-medium px-3 py-1.5 rounded-xl border transition '+(template===t.id?'border-transparent text-white':'border-gray-200 text-gray-600 hover:bg-gray-50')}
                style={template===t.id ? {background:brand.color} : {}}>
                {t.name}
              </button>
            ))}
          </div>
        </div>
        <Inp label="Para (e-mail)" type="email" value={toEmail} onChange={e => setToEmail(e.target.value)} placeholder="cliente@email.com"/>
        <Inp label="Assunto" value={subject} onChange={e => setSubject(e.target.value)} placeholder="Assunto do e-mail"/>
        <Textarea label="Mensagem" value={body} onChange={e => setBody(e.target.value)} placeholder="Escreva sua mensagem aqui..."/>
        <div className="bg-blue-50 border border-blue-100 rounded-xl px-4 py-3">
          <p className="text-xs text-blue-700">Substitua os textos em [colchetes] antes de enviar.</p>

        <div className="flex gap-2">
          <button onClick={handleCopy} className="flex-1 flex items-center justify-center gap-2 border border-gray-200 text-gray-700 rounded-xl py-2.5 text-sm font-medium hover:bg-gray-50 transition">
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
            {copied ? 'Copiado!' : 'Copiar'}
          </button>
          <button onClick={handleSend} disabled={!toEmail||!subject||!body} className="flex-1 flex items-center justify-center gap-2 text-white rounded-xl py-2.5 text-sm font-semibold hover:opacity-90 disabled:opacity-40" style={{background:brand.color}}>
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>

// ─── Relatorios ───────────────────────────────────────────────────────────────
const ReportView = memo(({transactions, showToast}) => {
  const availableMonths = useMemo(() => [...new Set(transactions.map(t => t.date.slice(0,7)))].sort((a,b) => b.localeCompare(a)), [transactions]);
  const [selectedMonth, setSelectedMonth] = useState(today().slice(0,7));

  const monthlyData = useMemo(() => {
    const monthTx  = transactions.filter(t => t.date.startsWith(selectedMonth));
    const income   = monthTx.filter(t => t.type==='income').reduce((s,t) => s+t.amount, 0);
    const expenses = monthTx.filter(t => t.type==='expense').reduce((s,t) => s+t.amount, 0);
    const byCategory = monthTx.filter(t => t.type==='expense').reduce((groups,t) => {
      const cat = t.category||'Outro'; groups[cat] = (groups[cat]||0)+t.amount; return groups;
    }, {});
    return {income, expenses, profit:income-expenses, byCategory, all:monthTx};
  }, [transactions, selectedMonth]);

  const handleExportCSV = useCallback(() => {
    const header = 'Data,Descricao,Valor,Tipo,Metodo/Cat';
    const rows = monthlyData.all.map(t =>
      t.date+',"'+t.desc+'",'+t.amount.toFixed(2)+','+(t.type==='income'?'Entrada':'Saida')+','+(t.method||t.category||'')
    );
    const csv = String.fromCharCode(65279) + header + "\n" + rows.join("\n");
    const link = document.createElement('a');
    link.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    link.download = 'relatorio-'+selectedMonth+'.csv';
    link.click();
    showToast('CSV exportado!');
  }, [monthlyData, selectedMonth, showToast]);

  return (
    <div className="flex flex-col gap-6">
      <div className="flex items-start justify-between">
        <div><h2 className="text-2xl font-bold text-gray-900">Relatorio</h2><p className="text-sm text-gray-400 mt-0.5">Fechamento mensal</p></div>
        {monthlyData.all.length > 0 && (
          <button onClick={handleExportCSV} className="flex items-center gap-2 border border-gray-200 text-gray-600 text-sm font-medium px-3 py-2 rounded-xl hover:bg-gray-50 transition">
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>CSV
          </button>
        )}
      </div>
      {availableMonths.length===0
        ? <Card><Empty icon="📊" title="Nenhum dado" sub="Registre vendas e despesas para gerar relatorios."/></Card>
        : <>
            <Sel label="Periodo" value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)}>
              {availableMonths.map(m => <option key={m} value={m}>{monthLabel(m)}</option>)}
            </Sel>
            <div className="grid grid-cols-3 gap-3">
              {[{l:'Entradas',v:monthlyData.income,c:'#16a34a'},{l:'Saidas',v:monthlyData.expenses,c:'#ef4444'},{l:'Lucro',v:monthlyData.profit,c:monthlyData.profit>=0?'#16a34a':'#ef4444'}].map(({l,v,c}) => (
                <Card key={l} className="p-4 text-center overflow-hidden relative">
                  <div className="absolute top-0 left-0 right-0 h-0.5" style={{background:c}}/>
                  <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide">{l}</p>
                  <p className="text-sm font-bold mt-2" style={{color:c}}>{fmt(v)}</p>
                </Card>
              ))}
            </div>
            {Object.keys(monthlyData.byCategory).length > 0 && (
              <Card className="p-5">
                <p className="text-sm font-semibold text-gray-800 mb-3">Despesas por categoria</p>
                <div className="flex flex-col gap-2.5">
                  {Object.entries(monthlyData.byCategory).sort(([,a],[,b]) => b-a).map(([cat,val]) => (
                    <div key={cat} className="flex items-center gap-3">
                      <span className="text-xs text-gray-500 w-20 flex-shrink-0 truncate">{cat}</span>
                      <div className="flex-1 bg-gray-100 rounded-full h-1.5 overflow-hidden"><div className="h-full bg-red-400 rounded-full" style={{width:(val/monthlyData.expenses*100).toFixed(0)+'%'}}/></div>
                      <span className="text-xs font-semibold text-gray-600 w-20 text-right">{fmt(val)}</span>
                    </div>
                  ))}
                </div>
              </Card>
            )}
            <Card>
              <div className="px-5 py-4 border-b border-gray-50 flex items-center justify-between">
                <p className="text-sm font-semibold text-gray-800">Movimentacoes</p>
                <span className="text-xs text-gray-400">{monthlyData.all.length+' registros'}</span>
              </div>
              {monthlyData.all.length===0
                ? <div className="py-10 text-center text-sm text-gray-400">Sem registros neste mes.</div>
                : <div className="divide-y divide-gray-50">{[...monthlyData.all].sort((a,b) => b.date.localeCompare(a.date)).map(tx => (
                    <div key={tx.id} className="flex items-center justify-between px-5 py-3">
                      <div className="flex items-center gap-3 min-w-0">
                        <div className={'w-7 h-7 rounded-lg flex items-center justify-center text-xs font-bold flex-shrink-0 '+(tx.type==='income'?'bg-green-50 text-green-600':'bg-red-50 text-red-500')}>{tx.type==='income'?'+':'-'}</div>
                        <div className="min-w-0"><p className="text-sm font-medium text-gray-800 truncate">{tx.desc}</p><p className="text-xs text-gray-400">{fmtDate(tx.date)+' - '+(tx.method||tx.category||'')}</p></div>
                      </div>
                      <span className={'text-sm font-semibold flex-shrink-0 ml-3 '+(tx.type==='income'?'text-green-600':'text-red-500')}>{(tx.type==='income'?'+':'-')+fmt(tx.amount)}</span>
                    </div>
                  ))}</div>
              }
            </Card>
          </>
      }
    </div>
  );
});

// SEGURANÇA: admin verificado no banco (user_roles), nao por e-mail
const AdminPanel = memo(({showToast}) => {
  const [form,       setForm]    = useState({email:'', password:''});
  const [creating,   setCreating]= useState(false);
  const [createdUser,setCreated] = useState(null);
  const [copied,     setCopied]  = useState(false);

  // SEGURANÇA: senha some automaticamente apos 30 segundos
  // Evita senha exposta por tempo indeterminado na tela
  useEffect(() => {
    if(!createdUser) return;
    const timer = setTimeout(() => setCreated(null), 30000);
    return () => clearTimeout(timer);
  }, [createdUser]);

  const handleCreate = async () => {
    if(!form.email || !form.password) return;
    if(form.password.length < 8) { showToast('Senha deve ter ao menos 8 caracteres.','error'); return; }
    setCreating(true);
    const {error} = await sb.auth.signUp({email:form.email, password:form.password});
    if(error) {
      showToast(error.message.includes('already') ? 'E-mail ja cadastrado.' : 'Erro: '+error.message, 'error');
    } else {
      setCreated({email:form.email, password:form.password});
      setForm({email:'', password:''});
      showToast('Cliente criado! Credenciais disponiveis por 30 segundos.');
    }
    setCreating(false);
  };

  const handleCopyCredentials = async () => {
    const msg = 'Sistema de Gestao Financeira' +
      '\n\nLink: https://gestao-financeira-7heu.onrender.com' +
      '\nE-mail: '+createdUser.email+
      '\nSenha: '+createdUser.password+
      '\n\nAcesse e configure o nome da empresa em Configuracoes.'

        <div className="flex gap-2">
          <input type="text" value={form.password} onChange={e => setForm(f=>({...f,password:e.target.value}))} placeholder="Minimo 8 caracteres"

                hint={pwForm.newPw.length>0 && pwForm.newPw.length<8 ? 'Muito curta' : ''}/>
              <Inp label="Confirmar senha" type="password" value={pwForm.confirm} onChange={e => setPwForm(f=>({...f,confirm:e.target.value}))} placeholder="Repita a senha"

              <button onClick={handleChangePassword} disabled={pwSaving||!pwForm.newPw||!pwForm.confirm}
                className="w-full text-white rounded-xl py-3 text-sm font-semibold hover:opacity-90 flex items-center justify-center gap-2 disabled:opacity-40" style={{background:'#374151'}}>
                {pwSaving ? <Spin white/> : 'Alterar senha'}
              </button>
            </div>
          </div>
          <div className="border-t border-gray-100 pt-4">
            <p className="text-sm font-semibold text-gray-800 mb-2">Seguranca do sistema</p>
            {['Dados criptografados no Supabase','Cada usuario acessa apenas seus dados (RLS ativo)','Conexao sempre via HTTPS','Sessao expira automaticamente','Admin verificado no banco de dados'].map((item, i) => (

// ─── Tela de login ────────────────────────────────────────────────────────────
const LoginScreen = () => {
  const [email,   setEmail]   = useState('');
  const [password,setPassword]= useState('');
  const [error,   setError]   = useState('');
  const [loading, setLoading] = useState(false);

  const handleLogin = async () => {
    if(!email || !password) return;
    setLoading(true); setError('');
    const {error: authError} = await sb.auth.signInWithPassword({email, password});
    if(authError) {
      setError(authError.message.includes('Invalid') ? 'E-mail ou senha incorretos.' : 'Erro ao entrar. Tente novamente.');
    }
    setLoading(false);
  };

  return (
    <div className="min-h-screen flex items-center justify-center p-4" style={{background:'#0f172a'}}>
      <div className="w-full max-w-sm">
        <div className="text-center mb-8">
          <div className="text-5xl mb-3">💼</div>
          <h1 className="text-2xl font-bold text-white">Gestao Financeira</h1>
          <p className="text-slate-400 text-sm mt-1">Entre com seu e-mail e senha</p>
        </div>
        <Card className="p-6 flex flex-col gap-4">
          <Inp label="E-mail" type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="seu@email.com"/>
          <Inp label="Senha" type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" onKeyDown={e => e.key==='Enter' && handleLogin()}/>
          {error && <div className="bg-red-50 border border-red-100 rounded-xl px-4 py-2.5"><p className="text-sm text-red-600">{error}</p></div>}
          <button onClick={handleLogin} disabled={loading||!email||!password}
            className="w-full text-white rounded-xl py-3 text-sm font-semibold hover:opacity-90 flex items-center justify-center gap-2 mt-1 disabled:opacity-50 bg-green-600">
            {loading ? <Spin white/> : 'Entrar'}
          </button>
        </Card>
      </div>
    </div>
  );
};

// ─── App (componente raiz) ────────────────────────────────────────────────────
function App() {
  const [session,      setSession]      = useState(null);
  const [isAdmin,      setIsAdmin]      = useState(false);
  const [appLoading,   setAppLoading]   = useState(true);
  const [dataLoading,  setDataLoading]  = useState(false);
  const [currentView,  setCurrentView]  = useState('dashboard');
  const [brand,        setBrand]        = useState(INIT_BRAND);
  const [transactions, setTransactions] = useState([]);
  const [products,     setProducts]     = useState([]);
  const [losses,       setLosses]       = useState([]);
  const [sidebarOpen,  setSidebarOpen]  = useState(false);
  const [toastData,    setToastData]    = useState(null);
  const [confirmData,  setConfirmData]  = useState(null);
  const [dataError,    setDataError]    = useState(null);

  // useCallback garante que showToast e showConfirm nao mudam de referencia
  // e nao causam re-renders desnecessarios nos filhos
  const showToast = useCallback((msg, type='success') => {
    setToastData({msg, type});
    setTimeout(() => setToastData(null), 3000);
  }, []);

  const showConfirm = useCallback((message, onConfirm) => {
    setConfirmData({message, onConfirm});
  }, []);

  const loadUserData = async (userId) => {
    setDataLoading(true); setDataError(null);
    try {
      // Queries com LIMIT = nunca carrega mais que QUERY_LIMIT registros de uma vez
      const [profileRes, productsRes, transactionsRes, lossesRes, roleRes] = await Promise.all([
        sb.from('company_profiles').select('*').eq('user_id', userId).maybeSingle(),
        sb.from('products').select('*').eq('user_id', userId).order('created_at').limit(QUERY_LIMIT),
        sb.from('transactions').select('*').eq('user_id', userId).order('date',{ascending:false}).limit(QUERY_LIMIT),
        sb.from('losses').select('*').eq('user_id', userId).order('date',{ascending:false}).limit(QUERY_LIMIT),
        // SEGURANCA: busca o papel do usuario no banco, nao verifica por e-mail
        sb.from('user_roles').select('role').eq('user_id', userId).maybeSingle(),
      ]);

      if(profileRes.data) setBrand({name:profileRes.data.name, logo:profileRes.data.logo, color:profileRes.data.color, logo_url:profileRes.data.logo_url||null});
      if(productsRes.data) setProducts(productsRes.data);
      if(transactionsRes.data) setTransactions(transactionsRes.data.map(t => ({...t, desc:t.description, cat:t.category})));
      if(lossesRes.data) setLosses(lossesRes.data.map(l => ({...l, desc:l.description})));

      // SEGURANCA: admin real vem do banco, nao do e-mail
      setIsAdmin(roleRes.data?.role === 'admin');
    } catch(err) {
      setDataError('Erro ao carregar dados. Verifique sua conexao.');
    }
    setDataLoading(false);
  };

  useEffect(() => {
    sb.auth.getSession().then(({data:{session}}) => {
      setSession(session);
      if(session) loadUserData(session.user.id);
      setAppLoading(false);
    });

    // onAuthStateChange gerencia sessao automaticamente
    // inclui renovacao do token antes de expirar
    const {data:{subscription}} = sb.auth.onAuthStateChange((event, session) => {
      setSession(session);
      if(session) {
        if(event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') {
          loadUserData(session.user.id);
        }
      } else {
        // Limpa dados ao fazer logout
        setTransactions([]); setProducts([]); setLosses([]);
        setBrand(INIT_BRAND); setIsAdmin(false);
      }
    });

    return () => subscription.unsubscribe();
  }, []);

  // ─── Funcoes de banco com tratamento de erro ───────────────────────────────
  const addTransaction = async (tx) => {
    const row = {id:tx.id, type:tx.type, description:tx.desc, amount:tx.amount, date:tx.date, method:tx.method||null, category:tx.cat||null, items:tx.items||null, user_id:session.user.id};
    const {error} = await sb.from('transactions').insert(row);
    if(error) { showToast('Erro ao salvar. Tente novamente.','error'); return; }
    setTransactions(prev => [{...tx,...row, desc:row.description, cat:row.category}, ...prev]);
  };

  const editTransaction = async (id, updates) => {
    const row = {description:updates.desc, amount:updates.amount, date:updates.date, method:updates.method||null, category:updates.cat||null};
    const {error} = await sb.from('transactions').update(row).eq('id',id);
    if(error) { showToast('Erro ao atualizar.','error'); return; }
    setTransactions(prev => prev.map(t => t.id===id ? {...t,...row, desc:row.description, cat:row.category} : t));
  };

  const deleteTransaction = async (id) => {
    const {error} = await sb.from('transactions').delete().eq('id',id);
    if(error) { showToast('Erro ao excluir.','error'); return; }
    setTransactions(prev => prev.filter(t => t.id!==id));
  };

  const addProduct = async (product) => {
    const row = {...product, user_id:session.user.id};
    const {error} = await sb.from('products').insert(row);
    if(error) { showToast('Erro ao salvar produto.','error'); return; }
    setProducts(prev => [...prev, row]);
  };

  const editProduct = async (id, updates) => {
    const {error} = await sb.from('products').update(updates).eq('id',id);
    if(error) { showToast('Erro ao atualizar.','error'); return; }
    setProducts(prev => prev.map(p => p.id===id ? {...p,...updates} : p));
  };

  const deleteProduct = async (id) => {
    const {error} = await sb.from('products').delete().eq('id',id);
    if(error) { showToast('Erro ao excluir.','error'); return; }
    setProducts(prev => prev.filter(p => p.id!==id));
  };

  const adjustStock = async (productId, delta) => {
    const product = products.find(p => p.id===productId);
    if(!product) return;
    const newStock = Math.max(0, (product.stock||0) + delta);
    const {error} = await sb.from('products').update({stock:newStock}).eq('id',productId);
    if(error) return;
    setProducts(prev => prev.map(p => p.id===productId ? {...p, stock:newStock} : p));
  };

  const addLoss = async (loss) => {
    const row = {id:loss.id, description:loss.desc, qty:loss.qty, reason:loss.reason||null, date:loss.date, user_id:session.user.id};
    const {error} = await sb.from('losses').insert(row);
    if(error) { showToast('Erro ao salvar perda.','error'); return; }
    setLosses(prev => [{...loss,...row}, ...prev]);
  };

  const editLoss = async (id, updates) => {
    const row = {description:updates.desc, qty:updates.qty, reason:updates.reason||null, date:updates.date};
    const {error} = await sb.from('losses').update(row).eq('id',id);
    if(error) { showToast('Erro ao atualizar.','error'); return; }
    setLosses(prev => prev.map(l => l.id===id ? {...l,...row, desc:row.description} : l));
  };

  const deleteLoss = async (id) => {
    const {error} = await sb.from('losses').delete().eq('id',id);
    if(error) { showToast('Erro ao excluir.','error'); return; }
    setLosses(prev => prev.filter(l => l.id!==id));
  };

  const saveBrand = async (newBrand) => {
    const {error} = await sb.from('company_profiles').upsert({user_id:session.user.id, name:sanitizeText(newBrand.name), logo:newBrand.logo, color:newBrand.color, logo_url:newBrand.logo_url||null});
    if(error) { showToast('Erro ao salvar.','error'); return; }
    setBrand(newBrand);
  };

  const LoadingScreen = ({text}) => (
    <div className="min-h-screen flex items-center justify-center flex-col gap-3" style={{background:'#f8fafc'}}>
      <div className="w-10 h-10 border-2 border-gray-200 rounded-full animate-spin" style={{borderTopColor:'#16a34a'}}/>
      {text && <p className="text-sm text-gray-400">{text}</p>}
    </div>
  );

  if(appLoading)  return <LoadingScreen/>;
  if(!session)    return <LoginScreen/>;
  if(dataLoading) return <LoadingScreen text="Carregando seus dados..."/>;
  if(dataError)   return (
    <div className="min-h-screen flex items-center justify-center flex-col gap-4 p-6" style={{background:'#f8fafc'}}>
      <span className="text-4xl">⚠️</span>
      <p className="text-sm font-semibold text-gray-700">{dataError}</p>
      <button onClick={() => loadUserData(session.user.id)} className="px-6 py-2.5 text-white rounded-xl text-sm font-semibold bg-green-600">Tentar novamente</button>
    </div>
  );

  // Props compartilhadas entre telas
  const sharedProps = {brand, showToast, showConfirm};

  const views = {
    dashboard: <Dashboard transactions={transactions} products={products} brand={brand} onNavigate={setCurrentView}/>,
    income:    <TransactionView type="income"  transactions={transactions} products={products} onAdd={addTransaction} onEdit={editTransaction} onDelete={deleteTransaction} onDeductStock={(id,qty) => adjustStock(id,-qty)} {...sharedProps}/>,
    expense:   <TransactionView type="expense" transactions={transactions} products={products} onAdd={addTransaction} onEdit={editTransaction} onDelete={deleteTransaction} onDeductStock={()=>{}} {...sharedProps}/>,
    inventory: <InventoryView products={products} losses={losses} onAddProduct={addProduct} onEditProduct={editProduct} onDeleteProduct={deleteProduct} onAddLoss={addLoss} onEditLoss={editLoss} onDeleteLoss={deleteLoss} onAdjustStock={adjustStock} {...sharedProps}/>,
    email:     <EmailView brand={brand} showToast={showToast}/>,
    report:    <ReportView transactions={transactions} showToast={showToast}/>,
    settings:  <SettingsView brand={brand} session={session} isAdmin={isAdmin} onSaveBrand={saveBrand} showToast={showToast} showConfirm={showConfirm}/>,
  };

  return (
    <div className="min-h-screen flex" style={{background:'#f8fafc'}}>
      <OfflineBanner/>
      <Sidebar currentView={currentView} onNavigate={setCurrentView} brand={brand} isOpen={sidebarOpen} onClose={() => setSidebarOpen(false)}/>
      <div className="flex-1 lg:ml-64 flex flex-col min-h-screen">
        <header className="sticky top-0 z-20 bg-white border-b border-gray-100 px-4 py-3 flex items-center gap-3 lg:hidden">
          <button onClick={() => setSidebarOpen(true)} className="text-gray-400 p-1 rounded-lg hover:bg-gray-100">
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
          <div className="flex items-center gap-2">
            {brand.logo_url
              ? <img src={brand.logo_url} alt="logo" className="w-7 h-7 rounded-lg object-cover"/>
              : <div className="w-7 h-7 rounded-lg flex items-center justify-center text-sm" style={{background:brand.color}}>{brand.logo}</div>
            }
            <span className="font-bold text-gray-900 text-sm">{brand.name}</span>
          </div>
        </header>
        <main className="flex-1 p-4 lg:p-8 max-w-2xl w-full mx-auto">{views[currentView]}</main>
      </div>
      <Toast toast={toastData}/>
      {confirmData && <ConfirmDialog message={confirmData.message} onConfirm={() => { confirmData.onConfirm(); setConfirmData(null); }} onCancel={() => setConfirmData(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
