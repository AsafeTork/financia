<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão Financeira</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{font-family:'Outfit',system-ui,sans-serif;box-sizing:border-box}
body{margin:0;background:#f8fafc}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.toast{animation:slideUp .25s ease}
.fade{animation:fadeIn .2s ease}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useMemo,useCallback}=React;
const {createClient}=window.supabase;
const sb=createClient('https://kxeqhorxhlgwcgywovqr.supabase.co','sb_publishable_EVJrndaIaxwLN9vUdSByUg__itH2rLy');

const INIT_BRAND={name:'Gestão Pro',color:'#16a34a',logo:'💼'};
const R$=v=>Number(v).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const today=()=>new Date().toISOString().slice(0,10);
const prevDays=n=>{const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().slice(0,10);};
const fmtDate=s=>new Date(s+'T12:00').toLocaleDateString('pt-BR');
const monthLabel=s=>{const[y,m]=s.split('-');return new Date(+y,+m-1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});};
let _uid=1;
const uid=()=>String(Date.now())+String(++_uid);

// ── Primitives ──────────────────────────────────────────────────────────────
const Inp=({label,className='',...p})=>(
  <div className={`flex flex-col gap-1.5 ${className}`}>
    {label&&<label className="text-xs font-semibold text-gray-400 uppercase tracking-wide">{label}</label>}
    <input className="border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-white focus:outline-none focus:border-gray-400 transition w-full" {...p}/>
  </div>
);
const Sel=({label,className='',children,...p})=>(
  <div className={`flex flex-col gap-1.5 ${className}`}>
    {label&&<label className="text-xs font-semibold text-gray-400 uppercase tracking-wide">{label}</label>}
    <select className="border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-white focus:outline-none focus:border-gray-400 transition" {...p}>{children}</select>
  </div>
);
const Card=({children,className=''})=><div className={`bg-white rounded-2xl shadow-sm border border-gray-100 ${className}`}>{children}</div>;
const Spin=({white})=><div className={`w-5 h-5 border-2 rounded-full animate-spin flex-shrink-0 ${white?'border-white border-t-transparent':'border-gray-300 border-t-gray-600'}`}/>;

const EmptyState=({icon,title,sub,action,onAction})=>(
  <div className="py-14 flex flex-col items-center gap-3 text-center px-6">
    <div className="text-4xl">{icon}</div>
    <p className="text-sm font-semibold text-gray-700">{title}</p>
    <p className="text-xs text-gray-400 max-w-xs">{sub}</p>
    {action&&<button onClick={onAction} className="mt-2 text-xs font-semibold px-4 py-2 rounded-xl text-white" style={{background:'#16a34a'}}>{action}</button>}
  </div>
);

// ── Toast ───────────────────────────────────────────────────────────────────
const ToastBar=({toast})=>toast?(
  <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 toast">
    <div className={`flex items-center gap-2.5 px-4 py-3 rounded-2xl shadow-lg text-sm font-medium text-white ${toast.type==='error'?'bg-red-500':'bg-gray-900'}`}>
      <span>{toast.type==='error'?'✗':'✓'}</span>
      {toast.msg}
    </div>
  </div>
):null;

// ── Action Buttons (edit + delete, always visible) ───────────────────────────
const EditBtn=({onClick})=>(
  <button onClick={onClick} className="p-1.5 rounded-lg text-gray-300 hover:text-blue-500 hover:bg-blue-50 transition flex-shrink-0">
    <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
  </button>
);
const DelBtn=({onClick})=>(
  <button onClick={onClick} className="p-1.5 rounded-lg text-gray-300 hover:text-red-500 hover:bg-red-50 transition flex-shrink-0">
    <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
  </button>
);

// ── Modal ───────────────────────────────────────────────────────────────────
const Modal=({title,onClose,onSave,color='#16a34a',saving,children,saveLabel='Salvar'})=>(
  <div className="fixed inset-0 z-50 flex items-center justify-center p-4 fade" style={{background:'rgba(0,0,0,0.5)'}}>
    <div className="bg-white rounded-2xl w-full max-w-sm flex flex-col" style={{boxShadow:'0 25px 60px rgba(0,0,0,0.2)',maxHeight:'90vh'}}>
      <div className="flex items-center justify-between px-6 py-4 border-b border-gray-100 flex-shrink-0">
        <span className="font-semibold text-gray-900">{title}</span>
        <button onClick={onClose} className="text-gray-400 hover:text-gray-600 p-1 rounded-lg hover:bg-gray-100"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg></button>
      </div>
      <div className="px-6 py-4 flex flex-col gap-3 overflow-y-auto">{children}</div>
      <div className="flex gap-2 px-6 pb-5 flex-shrink-0">
        <button onClick={onClose} className="flex-1 border border-gray-200 text-gray-600 rounded-xl py-2.5 text-sm font-medium hover:bg-gray-50">Cancelar</button>
        <button onClick={onSave} disabled={saving} className="flex-1 text-white rounded-xl py-2.5 text-sm font-semibold hover:opacity-90 flex items-center justify-center gap-2" style={{background:color}}>
          {saving?<Spin white/>:saveLabel}
        </button>
      </div>
    </div>
  </div>
);

// ── Product Search ───────────────────────────────────────────────────────────
const ProductSearch=({products,value,onSelect,onChange,placeholder})=>{
  const[open,setOpen]=useState(false);
  const filtered=value.length>0?products.filter(p=>p.name.toLowerCase().includes(value.toLowerCase())):products;
  return(
    <div className="relative flex-1">
      <input value={value} onChange={e=>{onChange(e.target.value);setOpen(true);}} onFocus={()=>setOpen(true)} onBlur={()=>setTimeout(()=>setOpen(false),120)}
        placeholder={placeholder||(products.length>0?'Buscar produto ou serviço…':'Descrição')}
        className="border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-white focus:outline-none focus:border-gray-400 transition w-full"/>
      {open&&products.length>0&&filtered.length>0&&(
        <div className="absolute top-full left-0 right-0 mt-1 bg-white rounded-xl border border-gray-200 z-30 overflow-hidden max-h-48 overflow-y-auto" style={{boxShadow:'0 8px 24px rgba(0,0,0,0.1)'}}>
          {filtered.map(p=>(
            <button key={p.id} onMouseDown={()=>{onSelect(p);setOpen(false);}} className="flex items-center justify-between w-full px-3 py-2.5 hover:bg-gray-50 text-left border-b border-gray-50 last:border-0">
              <div className="flex items-center gap-2 min-w-0">
                {p.category&&<span className="text-xs bg-gray-100 text-gray-400 px-1.5 py-0.5 rounded-md flex-shrink-0">{p.category}</span>}
                <span className="text-sm text-gray-800 truncate">{p.name}</span>
                {p.stock!=null&&<span className={`text-xs px-1.5 py-0.5 rounded-full flex-shrink-0 ${p.stock<=0?'bg-red-50 text-red-500':p.stock<=5?'bg-amber-50 text-amber-600':'bg-gray-100 text-gray-500'}`}>{p.stock}un</span>}
              </div>
              <span className="text-xs font-semibold text-gray-400 ml-2">{R$(p.price)}</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
};

// ── Cart Row ─────────────────────────────────────────────────────────────────
const CartRow=({item,idx,products,onChange,onSelect,onRemove})=>{
  const lt=(Number(item.qty)||0)*(Number(item.up)||0);
  return(
    <div className="rounded-xl border border-gray-100 bg-gray-50 p-3 flex flex-col gap-2">
      <div className="flex items-center gap-2">
        <ProductSearch products={products} value={item.desc} onSelect={p=>onSelect(idx,p.name,p.price)} onChange={v=>onChange(idx,'desc',v)}/>
        {onRemove&&<button onClick={onRemove} className="text-gray-300 hover:text-red-400 p-1 flex-shrink-0"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg></button>}
      </div>
      <div className="flex items-end gap-2">
        <Inp label="Qtd" type="number" min="1" value={item.qty} onChange={e=>onChange(idx,'qty',e.target.value)} className="w-16 flex-shrink-0"/>
        <Inp label="Preço unit." type="number" step="0.01" min="0" value={item.up} onChange={e=>onChange(idx,'up',e.target.value)} className="flex-1"/>
        <div className="flex flex-col gap-1.5 w-24 flex-shrink-0">
          <label className="text-xs font-semibold text-gray-400 uppercase tracking-wide">Total</label>
          <div className="border border-gray-100 rounded-xl px-3 py-2.5 text-sm bg-white text-gray-700 font-semibold">{lt>0?R$(lt):'—'}</div>
        </div>
      </div>
    </div>
  );
};

// ── Sale Form ─────────────────────────────────────────────────────────────────
const SaleForm=({products,brand,onSave,onClose})=>{
  const[items,setItems]=useState([{desc:'',qty:'1',up:''}]);
  const[date,setDate]=useState(today());
  const[method,setMethod]=useState('PIX');
  const[saving,setSaving]=useState(false);
  const total=items.reduce((s,i)=>s+(Number(i.qty)||0)*(Number(i.up)||0),0);
  const ch=(idx,f,v)=>setItems(p=>p.map((it,i)=>i===idx?{...it,[f]:v}:it));
  const sel=(idx,name,price)=>setItems(p=>p.map((it,i)=>i===idx?{...it,desc:name,up:String(price)}:it));
  const save=async()=>{
    const valid=items.filter(i=>i.desc&&i.up);
    if(!valid.length||!total)return;
    setSaving(true);
    await onSave({id:uid(),type:'income',desc:valid.length===1?valid[0].desc:`${valid.length} itens`,items:valid.map(i=>({desc:i.desc,qty:Number(i.qty)||1,unitPrice:Number(i.up)})),amount:total,date,method});
    onClose();
  };
  return(
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 fade" style={{background:'rgba(0,0,0,0.5)'}}>
      <div className="bg-white rounded-t-2xl sm:rounded-2xl w-full sm:max-w-lg flex flex-col" style={{maxHeight:'90vh',boxShadow:'0 25px 60px rgba(0,0,0,0.2)'}}>
        <div className="flex items-center justify-between px-6 py-4 border-b border-gray-100 flex-shrink-0">
          <span className="font-semibold text-gray-900">Nova Venda</span>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 p-1 rounded-lg hover:bg-gray-100"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg></button>
        </div>
        <div className="overflow-y-auto flex-1 px-6 py-4 flex flex-col gap-4">
          <div className="flex flex-col gap-3">
            {items.map((it,idx)=><CartRow key={idx} item={it} idx={idx} products={products} onChange={ch} onSelect={sel} onRemove={items.length>1?()=>setItems(p=>p.filter((_,i)=>i!==idx)):null}/>)}
            <button onClick={()=>setItems(p=>[...p,{desc:'',qty:'1',up:''}])} className="flex items-center gap-2 text-sm text-gray-400 hover:text-gray-600 w-fit">
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>Adicionar item
            </button>
          </div>
          <div className="flex items-center justify-between py-3 border-t border-b border-gray-100">
            <span className="text-sm font-semibold text-gray-600">Total da venda</span>
            <span className="text-2xl font-bold text-gray-900">{R$(total)}</span>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <Inp label="Data" type="date" value={date} onChange={e=>setDate(e.target.value)}/>
            <Sel label="Pagamento" value={method} onChange={e=>setMethod(e.target.value)}>
              {['PIX','Dinheiro','Cartão de Débito','Cartão de Crédito','Boleto','Transferência'].map(m=><option key={m}>{m}</option>)}
            </Sel>
          </div>
        </div>
        <div className="flex gap-2 px-6 pb-6 pt-3 flex-shrink-0">
          <button onClick={onClose} className="flex-1 border border-gray-200 text-gray-600 rounded-xl py-3 text-sm font-medium hover:bg-gray-50">Cancelar</button>
          <button onClick={save} disabled={saving} className="flex-1 text-white rounded-xl py-3 text-sm font-semibold hover:opacity-90 flex items-center justify-center gap-2" style={{background:brand.color}}>
            {saving?<Spin white/>:`Confirmar · ${R$(total)}`}
          </button>
        </div>
      </div>
    </div>
  );
};

// ── Sidebar ───────────────────────────────────────────────────────────────────
const NAV=[
  {key:'dashboard',label:'Dashboard',d:'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6'},
  {key:'income',label:'Vendas',d:'M12 4v16m8-8l-8-8-8 8'},
  {key:'expense',label:'Despesas',d:'M12 20V4m-8 8l8 8 8-8'},
  {key:'inventory',label:'Estoque',d:'M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4'},
  {key:'report',label:'Relatórios',d:'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z'},
  {key:'settings',label:'Configurações',d:'M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z M15 12a3 3 0 11-6 0 3 3 0 016 0z'},
];
const Sidebar=({view,onNav,brand,open,onClose})=>(
  <>
    {open&&<div className="fixed inset-0 z-30 bg-black bg-opacity-50 lg:hidden" onClick={onClose}/>}
    <aside className={`fixed top-0 left-0 h-full w-64 z-40 flex flex-col transition-transform duration-300 ${open?'translate-x-0':'-translate-x-full'} lg:translate-x-0`} style={{background:'#0f172a'}}>
      <div className="px-5 py-5 flex items-center gap-3" style={{borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
        <div className="w-9 h-9 rounded-xl flex items-center justify-center text-lg flex-shrink-0" style={{background:brand.color}}>{brand.logo}</div>
        <span className="font-bold text-white truncate">{brand.name}</span>
      </div>
      <nav className="flex-1 px-3 py-4 flex flex-col gap-0.5 overflow-y-auto">
        {NAV.map(({key,label,d})=>(
          <button key={key} onClick={()=>{onNav(key);onClose();}} className="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition w-full text-left relative"
            style={view===key?{background:'rgba(255,255,255,0.08)',color:'white'}:{color:'rgba(255,255,255,0.4)'}}>
            {view===key&&<div className="absolute left-0 top-1/2 -translate-y-1/2 w-0.5 h-5 rounded-r-full" style={{background:brand.color}}/>}
            <svg className="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.75} d={d}/></svg>
            {label}
          </button>
        ))}
      </nav>
      <div className="px-5 py-4" style={{borderTop:'1px solid rgba(255,255,255,0.06)'}}>
        <p className="text-xs" style={{color:'rgba(255,255,255,0.2)'}}>v4.0 · Gestão Financeira</p>
      </div>
    </aside>
  </>
);

// ── SVG Bar Chart ─────────────────────────────────────────────────────────────
const BarChart=({data})=>{
  const max=Math.max(...data.flatMap(d=>[d.i,d.o]),1);
  const W=44,H=130,bw=10,pad=4;
  return(
    <svg width="100%" height={H} viewBox={`0 0 ${data.length*W} ${H}`} preserveAspectRatio="xMidYMid meet">
      {data.map((d,i)=>{
        const x=i*W+pad;
        const ih=Math.round((d.i/max)*(H-24));
        const oh=Math.round((d.o/max)*(H-24));
        return(
          <g key={i}>
            <rect x={x} y={H-24-ih} width={bw} height={ih||1} fill="#16a34a" rx={2}/>
            <rect x={x+bw+2} y={H-24-oh} width={bw} height={oh||1} fill="#fca5a5" rx={2}/>
            <text x={x+bw+1} y={H-6} textAnchor="middle" fontSize={9} fill="#9ca3af">{d.day}</text>
          </g>
        );
      })}
    </svg>
  );
};

const KpiCard=({label,value,sub,color})=>(
  <Card className="p-5 overflow-hidden relative">
    <div className="absolute top-0 left-0 right-0 h-0.5 rounded-t-2xl" style={{background:color}}/>
    <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide">{label}</p>
    <p className="text-xl font-bold mt-2 text-gray-900 truncate">{value}</p>
    {sub&&<p className="text-xs text-gray-400 mt-0.5 truncate">{sub}</p>}
  </Card>
);

// ── Dashboard ─────────────────────────────────────────────────────────────────
const Dashboard=({tx,products,brand,onNav})=>{
  const cm=today().slice(0,7);
  const mtx=tx.filter(t=>t.date.startsWith(cm));
  const ti=mtx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const to=mtx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const dtx=tx.filter(t=>t.date===today());
  const di=dtx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const dout=dtx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const chartData=useMemo(()=>Array.from({length:7},(_,i)=>{
    const d=prevDays(6-i);const dt=tx.filter(t=>t.date===d);
    return{day:new Date(d+'T12:00').toLocaleDateString('pt-BR',{weekday:'short'}),i:dt.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0),o:dt.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0)};
  }),[tx]);
  const lowStock=products.filter(p=>p.stock!=null&&p.stock<=5);
  const recent=[...tx].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
  return(
    <div className="flex flex-col gap-6">
      <div><h2 className="text-2xl font-bold text-gray-900">Dashboard</h2><p className="text-sm text-gray-400 mt-0.5">{new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</p></div>
      {lowStock.length>0&&(
        <div className="rounded-2xl border border-amber-200 bg-amber-50 px-5 py-4 flex flex-col gap-2">
          <p className="text-sm font-semibold text-amber-800">⚠️ Estoque baixo — reponha em breve</p>
          {lowStock.map(p=><div key={p.id} className="flex items-center justify-between"><span className="text-sm text-amber-700">{p.name}</span><span className={`text-xs font-semibold px-2 py-0.5 rounded-full ${p.stock<=0?'bg-red-100 text-red-600':'bg-amber-100 text-amber-700'}`}>{p.stock<=0?'Esgotado':`${p.stock} un.`}</span></div>)}
        </div>
      )}
      <div className="grid grid-cols-2 gap-3">
        <KpiCard label="Entradas (mês)" value={R$(ti)} color="#16a34a"/>
        <KpiCard label="Saídas (mês)" value={R$(to)} color="#ef4444"/>
        <KpiCard label="Lucro líquido" value={R$(ti-to)} color={brand.color} sub="Este mês"/>
        <KpiCard label="Saldo hoje" value={R$(di-dout)} color="#3b82f6" sub={`+${R$(di)} / -${R$(dout)}`}/>
      </div>
      <Card className="p-5">
        <div className="flex items-center gap-4 mb-3">
          <p className="text-sm font-semibold text-gray-800">Fluxo dos últimos 7 dias</p>
          <div className="flex gap-3 text-xs text-gray-400">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-sm inline-block bg-green-600"/>Entradas</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-sm inline-block bg-red-200"/>Saídas</span>
          </div>
        </div>
        {tx.length===0?<div className="flex flex-col items-center py-8 gap-2"><p className="text-sm text-gray-300">Nenhuma movimentação ainda</p><button onClick={()=>onNav('income')} className="text-xs font-semibold text-green-600 hover:underline">Registrar primeira venda →</button></div>:<BarChart data={chartData}/>}
      </Card>
      <Card>
        <div className="px-5 py-4 border-b border-gray-50 flex items-center justify-between">
          <p className="text-sm font-semibold text-gray-800">Movimentações recentes</p>
          {recent.length>0&&<button onClick={()=>onNav('report')} className="text-xs text-gray-400 hover:text-gray-600">Ver relatório →</button>}
        </div>
        {recent.length===0?<EmptyState icon="📋" title="Nenhuma movimentação" sub="Comece registrando uma venda ou despesa." action="Registrar venda" onAction={()=>onNav('income')}/>:(
          <div className="divide-y divide-gray-50">
            {recent.map(t=>(
              <div key={t.id} className="flex items-center justify-between px-5 py-3.5">
                <div className="flex items-center gap-3">
                  <div className={`w-8 h-8 rounded-xl flex items-center justify-center text-sm font-bold flex-shrink-0 ${t.type==='income'?'bg-green-50 text-green-600':'bg-red-50 text-red-500'}`}>{t.type==='income'?'↑':'↓'}</div>
                  <div><p className="text-sm font-medium text-gray-800">{t.desc}</p><p className="text-xs text-gray-400">{fmtDate(t.date)} · {t.method||t.category}</p></div>
                </div>
                <span className={`text-sm font-semibold ${t.type==='income'?'text-green-600':'text-red-500'}`}>{t.type==='income'?'+':'-'}{R$(t.amount)}</span>
              </div>
            ))}
          </div>
        )}
      </Card>
    </div>
  );
};

// ── Income View ───────────────────────────────────────────────────────────────
const IncomeView=({tx,products,onAdd,onEdit,onDelete,onDeductStock,brand,showToast})=>{
  const[modal,setModal]=useState(false);
  const[editItem,setEditItem]=useState(null);
  const[saving,setSaving]=useState(false);
  const filtered=tx.filter(t=>t.type==='income').sort((a,b)=>b.date.localeCompare(a.date));
  const total=filtered.reduce((s,t)=>s+t.amount,0);

  const openEdit=t=>setEditItem({id:t.id,desc:t.desc,amount:String(t.amount),date:t.date,method:t.method||'PIX'});
  const saveEdit=async()=>{
    if(!editItem.desc||!editItem.amount)return;
    setSaving(true);
    await onEdit(editItem.id,{desc:editItem.desc,amount:Number(editItem.amount),date:editItem.date,method:editItem.method});
    showToast('Venda atualizada');setSaving(false);setEditItem(null);
  };

  return(
    <div className="flex flex-col gap-6">
      <div className="flex items-start justify-between">
        <div><h2 className="text-2xl font-bold text-gray-900">Vendas</h2><p className="text-sm text-gray-400 mt-0.5">{filtered.length} registro{filtered.length!==1?'s':''} · Total: <span className="font-semibold text-green-600">{R$(total)}</span></p></div>
        <button onClick={()=>setModal(true)} className="flex items-center gap-2 text-white text-sm font-semibold px-4 py-2.5 rounded-xl hover:opacity-90" style={{background:brand.color}}>
          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
          Nova Venda
        </button>
      </div>
      <Card>
        {filtered.length===0?<EmptyState icon="💰" title="Nenhuma venda registrada" sub="Toque em 'Nova Venda' para registrar com múltiplos itens e cálculo automático."/>:(
          <div className="divide-y divide-gray-50">
            {filtered.map(t=>(
              <div key={t.id} className="flex items-center justify-between px-4 py-3.5 gap-3">
                <div className="flex items-center gap-3 min-w-0 flex-1">
                  <div className="w-8 h-8 rounded-xl bg-green-50 text-green-600 flex items-center justify-center text-sm font-bold flex-shrink-0">↑</div>
                  <div className="min-w-0">
                    <p className="text-sm font-medium text-gray-800 truncate">{t.desc}</p>
                    <p className="text-xs text-gray-400">{fmtDate(t.date)} · {t.method}{t.items&&t.items.length>1?` · ${t.items.length} itens`:''}</p>
                  </div>
                </div>
                <div className="flex items-center gap-1 flex-shrink-0">
                  <span className="text-sm font-semibold text-green-600 mr-1">+{R$(t.amount)}</span>
                  <EditBtn onClick={()=>openEdit(t)}/>
                  <DelBtn onClick={async()=>{await onDelete(t.id);showToast('Venda removida');}}/>
                </div>
              </div>
            ))}
          </div>
        )}
      </Card>
      {modal&&<SaleForm products={products} brand={brand} onSave={async sale=>{await onAdd(sale);if(sale.items)sale.items.forEach(it=>{const p=products.find(p=>p.name===it.desc);if(p&&p.stock!=null)onDeductStock(p.id,it.qty);});showToast('Venda registrada!');}} onClose={()=>setModal(false)}/>}
      {editItem&&(
        <Modal title="Editar Venda" onClose={()=>setEditItem(null)} onSave={saveEdit} saving={saving} saveLabel="Salvar alterações">
          <Inp label="Descrição" value={editItem.desc} onChange={e=>setEditItem(f=>({...f,desc:e.target.value}))} placeholder="Descrição da venda"/>
          <Inp label="Valor total (R$)" type="number" step="0.01" min="0" value={editItem.amount} onChange={e=>setEditItem(f=>({...f,amount:e.target.value}))} placeholder="0,00"/>
          <Inp label="Data" type="date" value={editItem.date} onChange={e=>setEditItem(f=>({...f,date:e.target.value}))}/>
          <Sel label="Forma de pagamento" value={editItem.method} onChange={e=>setEditItem(f=>({...f,method:e.target.value}))}>
            {['PIX','Dinheiro','Cartão de Débito','Cartão de Crédito','Boleto','Transferência'].map(m=><option key={m}>{m}</option>)}
          </Sel>
        </Modal>
      )}
    </div>
  );
};

// ── Expense View ──────────────────────────────────────────────────────────────

          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
          Nova Despesa
        </button>
      </div>
      <Card>
        {filtered.length===0?<EmptyState icon="📤" title="Nenhuma despesa" sub="Registre aluguel, energia, estoque e outras saídas."/>:(
          <div className="divide-y divide-gray-50">
            {filtered.map(t=>(
              <div key={t.id} className="flex items-center justify-between px-4 py-3.5 gap-3">
                <div className="flex items-center gap-3 min-w-0 flex-1">
                  <div className="w-8 h-8 rounded-xl bg-red-50 text-red-500 flex items-center justify-center text-sm font-bold flex-shrink-0">↓</div>

                  <span className="text-sm font-semibold text-red-500 mr-1">-{R$(t.amount)}</span>

      {modal&&(

          <Inp label="Descrição" value={editItem.desc} onChange={e=>setEditItem(f=>({...f,desc:e.target.value}))}/>
          <Inp label="Valor (R$)" type="number" step="0.01" min="0" value={editItem.amount} onChange={e=>setEditItem(f=>({...f,amount:e.target.value}))}/>
          <Inp label="Data" type="date" value={editItem.date} onChange={e=>setEditItem(f=>({...f,date:e.target.value}))}/>

// ── Inventory View ────────────────────────────────────────────────────────────
const InventoryView=({products,losses,onAddProduct,onEditProduct,onDeleteProduct,onAddLoss,onEditLoss,onDeleteLoss,onAdjustStock,brand,showToast})=>{
  const[tab,setTab]=useState('products');
  const[search,setSearch]=useState('');
  const[collapsed,setCollapsed]=useState(new Set());
  const[pm,setPm]=useState(false);
  const[editProd,setEditProd]=useState(null);
  const[lm,setLm]=useState(false);
  const[editLoss,setEditLoss]=useState(null);
  const[sm,setSm]=useState(null);
  const[pf,setPf]=useState({name:'',category:'',price:'',cost:'',stock:''});
  const[lf,setLf]=useState({desc:'',qty:'1',reason:'',date:today()});
  const[sq,setSq]=useState('1');
  const[saving,setSaving]=useState(false);

  const saveProd=async()=>{
    if(!pf.name||!pf.price)return;
    setSaving(true);
    await onAddProduct({id:`P${String(Date.now()).slice(-6)}`,name:pf.name,category:pf.category||null,price:Number(pf.price),cost:pf.cost?Number(pf.cost):null,stock:pf.stock!==''?Number(pf.stock):null});
    showToast('Produto adicionado!');setSaving(false);setPm(false);setPf({name:'',category:'',price:'',cost:'',stock:''});
  };
  const saveEditProd=async()=>{
    if(!editProd.name||!editProd.price)return;
    setSaving(true);
    await onEditProduct(editProd.id,{name:editProd.name,category:editProd.category||null,price:Number(editProd.price),cost:editProd.cost?Number(editProd.cost):null,stock:editProd.stock!==''&&editProd.stock!=null?Number(editProd.stock):null});
    showToast('Produto atualizado');setSaving(false);setEditProd(null);
  };
  const saveLoss=async()=>{
    if(!lf.desc||!lf.qty)return;
    setSaving(true);
    await onAddLoss({id:uid(),desc:lf.desc,qty:Number(lf.qty),reason:lf.reason,date:lf.date});
    const p=products.find(p=>p.name===lf.desc);
    if(p&&p.stock!=null)await onAdjustStock(p.id,-Number(lf.qty));
    showToast('Perda registrada');setSaving(false);setLm(false);setLf({desc:'',qty:'1',reason:'',date:today()});
  };
  const saveEditLoss=async()=>{
    if(!editLoss.desc||!editLoss.qty)return;
    setSaving(true);
    await onEditLoss(editLoss.id,{desc:editLoss.desc,qty:Number(editLoss.qty),reason:editLoss.reason,date:editLoss.date});
    showToast('Perda atualizada');setSaving(false);setEditLoss(null);
  };
  const saveStock=async()=>{
    if(!sq||!sm)return;
    setSaving(true);
    await onAdjustStock(sm,Number(sq));
    showToast('Estoque atualizado!');setSaving(false);setSm(null);setSq('1');
  };

  const toggleCat=cat=>setCollapsed(p=>{const n=new Set(p);n.has(cat)?n.delete(cat):n.add(cat);return n;});
  const disp=search.trim()?products.filter(p=>[p.name,p.category,p.id].filter(Boolean).some(v=>v.toLowerCase().includes(search.toLowerCase()))):products;
  const grouped=Object.entries(disp.reduce((a,p)=>{const k=p.category||'Sem categoria';(a[k]=a[k]||[]).push(p);return a;},{})).sort(([a],[b])=>a==='Sem categoria'?1:b==='Sem categoria'?-1:a.localeCompare(b));
  const sp=sm?products.find(p=>p.id===sm):null;

  const openEditProd=p=>setEditProd({id:p.id,name:p.name,category:p.category||'',price:String(p.price),cost:p.cost!=null?String(p.cost):'',stock:p.stock!=null?String(p.stock):''});

  return(
    <div className="flex flex-col gap-6">
      <div className="flex items-start justify-between">
        <div><h2 className="text-2xl font-bold text-gray-900">Estoque</h2><p className="text-sm text-gray-400 mt-0.5">{products.length} item{products.length!==1?'s':''} cadastrado{products.length!==1?'s':''}</p></div>
        <div className="flex gap-2">
          {tab==='products'&&<button onClick={()=>setPm(true)} className="flex items-center gap-2 text-white text-sm font-semibold px-4 py-2.5 rounded-xl hover:opacity-90" style={{background:brand.color}}><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>Adicionar</button>}
          {tab==='losses'&&<button onClick={()=>setLm(true)} className="flex items-center gap-2 bg-red-600 text-white text-sm font-semibold px-4 py-2.5 rounded-xl hover:opacity-90"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>Perda</button>}
        </div>
      </div>
      <div className="flex gap-1 bg-gray-100 rounded-xl p-1">
        {[{key:'products',label:'Produtos e Serviços'},{key:'losses',label:'Perdas'}].map(t=>(
          <button key={t.key} onClick={()=>setTab(t.key)} className={`flex-1 py-2 text-sm font-medium rounded-lg transition ${tab===t.key?'bg-white text-gray-900 shadow-sm':'text-gray-500'}`}>{t.label}</button>
        ))}
      </div>

      {tab==='products'&&(
        <Card>
          <div className="px-5 py-3 border-b border-gray-50">
            <div className="relative">
              <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar por nome ou categoria…" className="w-full pl-9 pr-3 py-2 text-sm bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:border-gray-300"/>
            </div>
          </div>
          {disp.length===0?<EmptyState icon="📦" title="Nenhum item" sub="Adicione produtos com categoria, custo, preço e estoque."/>:(
            grouped.map(([cat,items])=>(
              <div key={cat}>
                <button onClick={()=>toggleCat(cat)} className="w-full flex items-center justify-between px-5 py-2.5 bg-gray-50 hover:bg-gray-100 transition border-b border-gray-100">
                  <div className="flex items-center gap-2">
                    <svg className={`w-3.5 h-3.5 text-gray-400 transition-transform ${collapsed.has(cat)?'-rotate-90':''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/></svg>
                    <span className="text-xs font-semibold text-gray-500 uppercase tracking-wide">{cat}</span>
                  </div>
                  <span className="text-xs text-gray-400">{items.length} {items.length===1?'item':'itens'}</span>
                </button>
                {!collapsed.has(cat)&&(
                  <div className="divide-y divide-gray-50">
                    {items.map(p=>(
                      <div key={p.id} className="px-4 py-3.5 flex items-center justify-between gap-3">
                        <div className="min-w-0 flex-1">
                          <p className="text-sm font-medium text-gray-800">{p.name}</p>
                          <div className="flex items-center gap-3 mt-0.5 flex-wrap">
                            <span className="text-xs text-gray-400">Venda: {R$(p.price)}</span>
                            {p.cost!=null&&<><span className="text-xs text-gray-400">Custo: {R$(p.cost)}</span><span className="text-xs text-green-600 font-medium">Margem: {(((p.price-p.cost)/p.price)*100).toFixed(0)}%</span></>}
                          </div>
                        </div>
                        <div className="flex items-center gap-1 flex-shrink-0">
                          {p.stock!=null&&<button onClick={()=>{setSm(p.id);setSq('1');}} className={`text-xs font-semibold px-2.5 py-1 rounded-lg mr-1 ${p.stock<=0?'bg-red-50 text-red-600':p.stock<=5?'bg-amber-50 text-amber-700':'bg-green-50 text-green-700'}`}>{p.stock<=0?'Esgotado':`${p.stock} un`}</button>}
                          <EditBtn onClick={()=>openEditProd(p)}/>
                          <DelBtn onClick={async()=>{await onDeleteProduct(p.id);showToast('Produto removido');}}/>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            ))
          )}
        </Card>
      )}

      {tab==='losses'&&(
        <Card>
          {losses.length===0?<EmptyState icon="⚠️" title="Nenhuma perda" sub="Registre produtos vencidos, cancelados ou danificados aqui."/>:(
            <div className="divide-y divide-gray-50">
              {[...losses].sort((a,b)=>b.date.localeCompare(a.date)).map(l=>(
                <div key={l.id} className="flex items-center justify-between px-4 py-3.5 gap-3">
                  <div className="flex items-center gap-3 min-w-0 flex-1">
                    <div className="w-8 h-8 rounded-xl bg-amber-50 text-amber-600 flex items-center justify-center text-sm flex-shrink-0">⚠</div>
                    <div className="min-w-0"><p className="text-sm font-medium text-gray-800">{l.qty}× {l.desc}</p><p className="text-xs text-gray-400">{fmtDate(l.date)}{l.reason?` · ${l.reason}`:''}</p></div>
                  </div>
                  <div className="flex items-center gap-1 flex-shrink-0">
                    <EditBtn onClick={()=>setEditLoss({id:l.id,desc:l.desc,qty:String(l.qty),reason:l.reason||'',date:l.date})}/>
                    <DelBtn onClick={async()=>{await onDeleteLoss(l.id);showToast('Perda removida');}}/>
                  </div>
                </div>
              ))}
            </div>
          )}
        </Card>
      )}

      {pm&&(
        <Modal title="Novo Produto ou Serviço" onClose={()=>setPm(false)} onSave={saveProd} saving={saving}>
          <Inp label="Nome *" value={pf.name} onChange={e=>setPf(f=>({...f,name:e.target.value}))} placeholder="Ex: Corte de cabelo, Camiseta P…"/>
          <Inp label="Categoria" value={pf.category} onChange={e=>setPf(f=>({...f,category:e.target.value}))} placeholder="Ex: Serviços, Roupas, Alimentos…"/>
          <div className="grid grid-cols-2 gap-3">
            <Inp label="Preço de venda *" type="number" step="0.01" min="0" value={pf.price} onChange={e=>setPf(f=>({...f,price:e.target.value}))} placeholder="0,00"/>
            <Inp label="Custo" type="number" step="0.01" min="0" value={pf.cost} onChange={e=>setPf(f=>({...f,cost:e.target.value}))} placeholder="0,00 (opcional)"/>
          </div>
          <Inp label="Estoque inicial (deixe em branco para serviços)" type="number" min="0" value={pf.stock} onChange={e=>setPf(f=>({...f,stock:e.target.value}))} placeholder="Ex: 50"/>
        </Modal>
      )}
      {editProd&&(
        <Modal title="Editar Produto" onClose={()=>setEditProd(null)} onSave={saveEditProd} saving={saving} saveLabel="Salvar alterações">
          <Inp label="Nome *" value={editProd.name} onChange={e=>setEditProd(f=>({...f,name:e.target.value}))}/>
          <Inp label="Categoria" value={editProd.category} onChange={e=>setEditProd(f=>({...f,category:e.target.value}))} placeholder="Ex: Serviços, Roupas…"/>
          <div className="grid grid-cols-2 gap-3">
            <Inp label="Preço de venda *" type="number" step="0.01" min="0" value={editProd.price} onChange={e=>setEditProd(f=>({...f,price:e.target.value}))}/>
            <Inp label="Custo" type="number" step="0.01" min="0" value={editProd.cost} onChange={e=>setEditProd(f=>({...f,cost:e.target.value}))} placeholder="Opcional"/>
          </div>
          <Inp label="Estoque atual" type="number" min="0" value={editProd.stock} onChange={e=>setEditProd(f=>({...f,stock:e.target.value}))} placeholder="Em branco para serviços"/>
        </Modal>
      )}
      {lm&&(
        <Modal title="Registrar Perda" onClose={()=>setLm(false)} onSave={saveLoss} color="#dc2626" saving={saving}>
          <div className="flex flex-col gap-1.5">
            <label className="text-xs font-semibold text-gray-400 uppercase tracking-wide">Produto / Serviço</label>
            <ProductSearch products={products} value={lf.desc} onSelect={p=>setLf(f=>({...f,desc:p.name}))} onChange={v=>setLf(f=>({...f,desc:v}))} placeholder="Buscar ou digitar"/>
          </div>
          <Inp label="Quantidade perdida" type="number" min="1" value={lf.qty} onChange={e=>setLf(f=>({...f,qty:e.target.value}))}/>
          <Inp label="Motivo" value={lf.reason} onChange={e=>setLf(f=>({...f,reason:e.target.value}))} placeholder="Ex: Vencimento, Avaria, Cancelamento…"/>
          <Inp label="Data" type="date" value={lf.date} onChange={e=>setLf(f=>({...f,date:e.target.value}))}/>
        </Modal>
      )}
      {editLoss&&(
        <Modal title="Editar Perda" onClose={()=>setEditLoss(null)} onSave={saveEditLoss} color="#dc2626" saving={saving} saveLabel="Salvar alterações">
          <div className="flex flex-col gap-1.5">
            <label className="text-xs font-semibold text-gray-400 uppercase tracking-wide">Produto / Serviço</label>
            <ProductSearch products={products} value={editLoss.desc} onSelect={p=>setEditLoss(f=>({...f,desc:p.name}))} onChange={v=>setEditLoss(f=>({...f,desc:v}))} placeholder="Buscar ou digitar"/>
          </div>
          <Inp label="Quantidade" type="number" min="1" value={editLoss.qty} onChange={e=>setEditLoss(f=>({...f,qty:e.target.value}))}/>
          <Inp label="Motivo" value={editLoss.reason} onChange={e=>setEditLoss(f=>({...f,reason:e.target.value}))} placeholder="Ex: Vencimento, Avaria…"/>
          <Inp label="Data" type="date" value={editLoss.date} onChange={e=>setEditLoss(f=>({...f,date:e.target.value}))}/>
        </Modal>
      )}
      {sm&&sp&&(
        <Modal title={`Repor estoque · ${sp.name}`} onClose={()=>setSm(null)} onSave={saveStock} saving={saving} saveLabel={`Adicionar ao estoque`}>
          <div className="rounded-xl bg-gray-50 px-4 py-3 flex items-center justify-between">
            <span className="text-sm text-gray-600">Estoque atual</span>
            <span className="text-lg font-bold text-gray-900">{sp.stock} un.</span>
          </div>
          <Inp label="Quantidade a adicionar" type="number" min="1" value={sq} onChange={e=>setSq(e.target.value)} placeholder="Ex: 10"/>
          {sq&&Number(sq)>0&&<p className="text-xs text-gray-400 text-center">Novo estoque: <strong>{(sp.stock||0)+Number(sq)} un.</strong></p>}
        </Modal>
      )}
    </div>
  );
};

// ── Report View ───────────────────────────────────────────────────────────────
const ReportView=({tx})=>{
  const months=useMemo(()=>[...new Set(tx.map(t=>t.date.slice(0,7)))].sort((a,b)=>b.localeCompare(a)),[tx]);
  const[month,setMonth]=useState(today().slice(0,7));
  const filtered=tx.filter(t=>t.date.startsWith(month));
  const income=filtered.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense=filtered.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const bycat=filtered.filter(t=>t.type==='expense').reduce((a,t)=>{const k=t.category||'Outro';a[k]=(a[k]||0)+t.amount;return a;},{});
  return(
    <div className="flex flex-col gap-6">
      <div><h2 className="text-2xl font-bold text-gray-900">Relatório</h2><p className="text-sm text-gray-400 mt-0.5">Fechamento mensal</p></div>
      {months.length===0?<Card><EmptyState icon="📊" title="Nenhum dado" sub="Registre vendas e despesas para gerar relatórios."/></Card>:(
        <>
          <Sel label="Período" value={month} onChange={e=>setMonth(e.target.value)}>
            {months.map(m=><option key={m} value={m}>{monthLabel(m)}</option>)}
          </Sel>
          <div className="grid grid-cols-3 gap-3">
            {[{label:'Entradas',val:income,color:'#16a34a'},{label:'Saídas',val:expense,color:'#ef4444'},{label:'Lucro',val:income-expense,color:income-expense>=0?'#16a34a':'#ef4444'}].map(({label,val,color})=>(
              <Card key={label} className="p-4 text-center overflow-hidden relative">
                <div className="absolute top-0 left-0 right-0 h-0.5" style={{background:color}}/>
                <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide">{label}</p>
                <p className="text-sm font-bold mt-2" style={{color}}>{R$(val)}</p>
              </Card>
            ))}
          </div>
          {Object.keys(bycat).length>0&&(
            <Card className="p-5">
              <p className="text-sm font-semibold text-gray-800 mb-3">Despesas por categoria</p>
              <div className="flex flex-col gap-2">
                {Object.entries(bycat).sort(([,a],[,b])=>b-a).map(([cat,val])=>(
                  <div key={cat} className="flex items-center gap-3">
                    <span className="text-xs text-gray-500 w-20 flex-shrink-0 truncate">{cat}</span>
                    <div className="flex-1 bg-gray-100 rounded-full h-1.5 overflow-hidden">
                      <div className="h-full bg-red-400 rounded-full" style={{width:`${(val/expense*100).toFixed(0)}%`}}/>
                    </div>
                    <span className="text-xs font-semibold text-gray-600 w-20 text-right">{R$(val)}</span>
                  </div>
                ))}
              </div>
            </Card>
          )}
          <Card>
            <div className="px-5 py-4 border-b border-gray-50 flex items-center justify-between">
              <p className="text-sm font-semibold text-gray-800">Todas as movimentações</p>
              <span className="text-xs text-gray-400">{filtered.length} registros</span>
            </div>
            {filtered.length===0?<EmptyState icon="🗓️" title="Sem registros neste mês." sub=""/>:(
              <div className="divide-y divide-gray-50">
                {[...filtered].sort((a,b)=>b.date.localeCompare(a.date)).map(t=>(
                  <div key={t.id} className="flex items-center justify-between px-5 py-3">
                    <div className="flex items-center gap-3">
                      <div className={`w-7 h-7 rounded-lg flex items-center justify-center text-xs font-bold ${t.type==='income'?'bg-green-50 text-green-600':'bg-red-50 text-red-500'}`}>{t.type==='income'?'↑':'↓'}</div>
                      <div><p className="text-sm font-medium text-gray-800">{t.desc}</p><p className="text-xs text-gray-400">{fmtDate(t.date)} · {t.method||t.category}</p></div>
                    </div>
                    <span className={`text-sm font-semibold ${t.type==='income'?'text-green-600':'text-red-500'}`}>{t.type==='income'?'+':'-'}{R$(t.amount)}</span>
                  </div>
                ))}
              </div>
            )}
          </Card>
        </>
      )}
    </div>
  );
};

// ── Settings View ─────────────────────────────────────────────────────────────
const SettingsView=({brand,onSave,onLogout,showToast})=>{
  const[form,setForm]=useState({...brand});
  const[saving,setSaving]=useState(false);
  const COLORS=['#16a34a','#2563eb','#7c3aed','#dc2626','#ea580c','#0891b2','#be185d','#374151','#b45309'];
  const save=async()=>{setSaving(true);await onSave(form);showToast('Configurações salvas!');setSaving(false);};
  return(
    <div className="flex flex-col gap-6">
      <div><h2 className="text-2xl font-bold text-gray-900">Configurações</h2><p className="text-sm text-gray-400 mt-0.5">Nome, cor e ícone da empresa</p></div>
      <Card className="p-6 flex flex-col gap-5">
        <Inp label="Nome da empresa" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Nome da empresa"/>
        <Inp label="Emoji / ícone" value={form.logo} onChange={e=>setForm(f=>({...f,logo:e.target.value}))} placeholder="💼"/>
        <div className="flex flex-col gap-2">
          <label className="text-xs font-semibold text-gray-400 uppercase tracking-wide">Cor principal</label>
          <div className="flex gap-2 flex-wrap">
            {COLORS.map(c=>(
              <button key={c} onClick={()=>setForm(f=>({...f,color:c}))} className="w-9 h-9 rounded-full hover:scale-110 transition-transform flex items-center justify-center" style={{background:c}}>
                {form.color===c&&<svg className="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7"/></svg>}
              </button>
            ))}
          </div>
          <Inp label="Código hexadecimal personalizado" value={form.color} onChange={e=>setForm(f=>({...f,color:e.target.value}))} placeholder="#16a34a"/>
        </div>
        <div className="rounded-xl p-4 bg-gray-50 border border-gray-100">
          <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-3">Pré-visualização</p>
          <div className="flex items-center gap-3 p-3 rounded-xl w-fit" style={{background:'#0f172a'}}>
            <div className="w-8 h-8 rounded-xl flex items-center justify-center text-base" style={{background:form.color}}>{form.logo}</div>
            <span className="font-bold text-white text-sm">{form.name||'Nome da empresa'}</span>
          </div>
        </div>
        <button onClick={save} disabled={saving} className="w-full text-white rounded-xl py-3 text-sm font-semibold hover:opacity-90 flex items-center justify-center gap-2" style={{background:form.color}}>
          {saving?<Spin white/>:'Salvar e aplicar'}
        </button>
      </Card>
      <Card className="p-6">
        <p className="text-sm font-semibold text-gray-800 mb-1">Conta</p>
        <p className="text-xs text-gray-400 mb-4">Seus dados ficam salvos no servidor — acesse de qualquer dispositivo a qualquer hora.</p>
        <button onClick={onLogout} className="w-full border border-gray-200 text-gray-600 rounded-xl py-2.5 text-sm font-medium hover:bg-gray-50 transition">Sair da conta</button>
      </Card>
    </div>
  );
};

// ── Login Screen ──────────────────────────────────────────────────────────────
const LoginScreen=()=>{
  const[email,setEmail]=useState('');
  const[pass,setPass]=useState('');
  const[err,setErr]=useState('');
  const[loading,setLoading]=useState(false);
  const login=async()=>{
    if(!email||!pass)return;
    setLoading(true);setErr('');
    const{error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error)setErr('Email ou senha incorretos. Verifique e tente de novo.');
    setLoading(false);
  };
  return(
    <div className="min-h-screen flex items-center justify-center p-4" style={{background:'#0f172a'}}>
      <div className="w-full max-w-sm">
        <div className="text-center mb-8">
          <div className="text-5xl mb-3">💼</div>
          <h1 className="text-2xl font-bold text-white">Gestão Financeira</h1>
          <p className="text-slate-400 text-sm mt-1">Entre com seu email e senha</p>
        </div>
        <Card className="p-6 flex flex-col gap-4">
          <Inp label="Email" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="seu@email.com"/>
          <div>
            <Inp label="Senha" type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==='Enter'&&login()}/>
            <p className="text-xs text-gray-400 mt-1.5">Esqueceu a senha? Entre em contato com o suporte.</p>
          </div>
          {err&&<div className="bg-red-50 border border-red-100 rounded-xl px-4 py-2.5"><p className="text-sm text-red-600">{err}</p></div>}
          <button onClick={login} disabled={loading} className="w-full text-white rounded-xl py-3 text-sm font-semibold hover:opacity-90 flex items-center justify-center gap-2 mt-1" style={{background:'#16a34a'}}>
            {loading?<Spin white/>:'Entrar'}
          </button>
        </Card>
      </div>
    </div>
  );
};

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const[session,setSession]=useState(null);
  const[appLoading,setAppLoading]=useState(true);
  const[dataLoading,setDataLoading]=useState(false);
  const[view,setView]=useState('dashboard');
  const[brand,setBrand]=useState(INIT_BRAND);
  const[tx,setTx]=useState([]);
  const[products,setProducts]=useState([]);
  const[losses,setLosses]=useState([]);
  const[sidebarOpen,setSidebarOpen]=useState(false);
  const[toast,setToast]=useState(null);

  const showToast=useCallback((msg,type='success')=>{
    setToast({msg,type});
    setTimeout(()=>setToast(null),3000);
  },[]);

  const loadData=async uid=>{
    setDataLoading(true);
    const[pr,pdr,txr,lr]=await Promise.all([
      sb.from('company_profiles').select('*').eq('user_id',uid).maybeSingle(),
      sb.from('products').select('*').order('created_at'),
      sb.from('transactions').select('*').order('date',{ascending:false}),
      sb.from('losses').select('*').order('date',{ascending:false}),
    ]);
    if(pr.data)setBrand({name:pr.data.name,logo:pr.data.logo,color:pr.data.color});
    if(pdr.data)setProducts(pdr.data);
    if(txr.data)setTx(txr.data.map(t=>({...t,desc:t.description,cat:t.category})));
    if(lr.data)setLosses(lr.data.map(l=>({...l,desc:l.description})));
    setDataLoading(false);
  };

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      setSession(session);
      if(session)loadData(session.user.id);
      setAppLoading(false);
    });
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{
      setSession(session);
      if(session)loadData(session.user.id);
      else{setTx([]);setProducts([]);setLosses([]);setBrand(INIT_BRAND);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  // ── CRUD ──────────────────────────────────────────────────────────────────
  const addTx=async t=>{
    const row={id:t.id,type:t.type,description:t.desc,amount:t.amount,date:t.date,method:t.method||null,category:t.cat||null,items:t.items||null,user_id:session.user.id};
    const{error}=await sb.from('transactions').insert(row);
    if(!error)setTx(p=>[{...t,...row,desc:row.description,cat:row.category},...p]);
  };
  const editTx=async(id,u)=>{
    const row={description:u.desc,amount:u.amount,date:u.date,method:u.method||null,category:u.cat||null};
    const{error}=await sb.from('transactions').update(row).eq('id',id);
    if(!error)setTx(p=>p.map(t=>t.id===id?{...t,...row,desc:row.description,cat:row.category}:t));
  };
  const deleteTx=async id=>{await sb.from('transactions').delete().eq('id',id);setTx(p=>p.filter(t=>t.id!==id));};

  const addProduct=async p=>{
    const row={...p,user_id:session.user.id};
    const{error}=await sb.from('products').insert(row);
    if(!error)setProducts(prev=>[...prev,row]);
  };
  const editProduct=async(id,u)=>{
    const{error}=await sb.from('products').update(u).eq('id',id);
    if(!error)setProducts(p=>p.map(p=>p.id===id?{...p,...u}:p));
  };
  const deleteProduct=async id=>{await sb.from('products').delete().eq('id',id);setProducts(p=>p.filter(p=>p.id!==id));};
  const adjustStock=async(id,delta)=>{
    const p=products.find(p=>p.id===id);if(!p)return;
    const ns=Math.max(0,(p.stock||0)+delta);
    await sb.from('products').update({stock:ns}).eq('id',id);
    setProducts(p=>p.map(p=>p.id===id?{...p,stock:ns}:p));
  };

  const addLoss=async l=>{
    const row={id:l.id,description:l.desc,qty:l.qty,reason:l.reason||null,date:l.date,user_id:session.user.id};
    const{error}=await sb.from('losses').insert(row);
    if(!error)setLosses(p=>[{...l,...row},...p]);
  };
  const editLoss=async(id,u)=>{
    const row={description:u.desc,qty:u.qty,reason:u.reason||null,date:u.date};
    const{error}=await sb.from('losses').update(row).eq('id',id);
    if(!error)setLosses(p=>p.map(l=>l.id===id?{...l,...row,desc:row.description}:l));
  };
  const deleteLoss=async id=>{await sb.from('losses').delete().eq('id',id);setLosses(p=>p.filter(l=>l.id!==id));};

  const saveBrand=async nb=>{
    await sb.from('company_profiles').upsert({user_id:session.user.id,name:nb.name,logo:nb.logo,color:nb.color});
    setBrand(nb);
  };

  const LoadingScreen=({text})=>(
    <div className="min-h-screen flex items-center justify-center flex-col gap-3" style={{background:'#f8fafc'}}>
      <div className="w-10 h-10 border-2 border-gray-200 rounded-full animate-spin" style={{borderTopColor:'#16a34a'}}/>
      {text&&<p className="text-sm text-gray-400">{text}</p>}
    </div>
  );

  if(appLoading)return<LoadingScreen/>;
  if(!session)return<LoginScreen/>;
  if(dataLoading)return<LoadingScreen text="Carregando seus dados…"/>;

  const views={
    dashboard:<Dashboard tx={tx} products={products} brand={brand} onNav={setView}/>,
    income:<IncomeView tx={tx} products={products} onAdd={addTx} onEdit={editTx} onDelete={deleteTx} onDeductStock={(id,qty)=>adjustStock(id,-qty)} brand={brand} showToast={showToast}/>,
    expense:<ExpenseView tx={tx} onAdd={addTx} onEdit={editTx} onDelete={deleteTx} brand={brand} showToast={showToast}/>,
    inventory:<InventoryView products={products} losses={losses} onAddProduct={addProduct} onEditProduct={editProduct} onDeleteProduct={deleteProduct} onAddLoss={addLoss} onEditLoss={editLoss} onDeleteLoss={deleteLoss} onAdjustStock={adjustStock} brand={brand} showToast={showToast}/>,
    report:<ReportView tx={tx}/>,
    settings:<SettingsView brand={brand} onSave={saveBrand} onLogout={()=>sb.auth.signOut()} showToast={showToast}/>,
  };

  return(
    <div className="min-h-screen flex" style={{background:'#f8fafc'}}>
      <Sidebar view={view} onNav={setView} brand={brand} open={sidebarOpen} onClose={()=>setSidebarOpen(false)}/>
      <div className="flex-1 lg:ml-64 flex flex-col min-h-screen">
        <header className="sticky top-0 z-20 bg-white border-b border-gray-100 px-4 py-3 flex items-center gap-3 lg:hidden">
          <button onClick={()=>setSidebarOpen(true)} className="text-gray-400 p-1 rounded-lg hover:bg-gray-100">
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
          <div className="flex items-center gap-2">
            <div className="w-7 h-7 rounded-lg flex items-center justify-center text-sm" style={{background:brand.color}}>{brand.logo}</div>
            <span className="font-bold text-gray-900 text-sm">{brand.name}</span>
          </div>
        </header>
        <main className="flex-1 p-4 lg:p-8 max-w-2xl w-full mx-auto">{views[view]}</main>
      </div>
      <ToastBar toast={toast}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
